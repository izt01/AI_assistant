<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="https://js.stripe.com/v3/"></script>
<title>プラン・課金 — Lumina AI</title>
<style>
.plan-card{border:2px solid var(--border);border-radius:18px;padding:22px;position:relative;transition:all .2s;background:var(--surface)}
.plan-card.current{border-color:var(--gold2);box-shadow:0 0 0 1px var(--gold2),0 8px 30px rgba(201,168,76,.1)}
.plan-card.recommended{border-color:#2563eb;box-shadow:0 0 0 1px #2563eb,0 8px 30px rgba(37,99,235,.08)}
.plan-badge-top{position:absolute;top:-11px;left:50%;transform:translateX(-50%);font-size:9.5px;font-weight:700;padding:3px 14px;border-radius:99px;white-space:nowrap}
.plan-badge-top.curr{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink)}
.plan-badge-top.rec{background:#2563eb;color:#fff}
.plan-name{font-family:'Fraunces',serif;font-size:24px;font-weight:900;color:var(--ink);margin-bottom:4px}
.plan-price{font-family:'Fraunces',serif;font-size:38px;font-weight:900;color:var(--gold);letter-spacing:-.04em;line-height:1;margin-bottom:3px}
.plan-price span{font-size:13px;font-weight:400;color:var(--muted)}
.feat-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin:16px 0}
.feat-list li{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:var(--muted)}
.feat-check{font-size:11px;flex-shrink:0;margin-top:2px}
.feat-check.ok{color:var(--success)}.feat-check.no{color:var(--subtle)}
.history-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--cream2);font-size:12.5px}
.history-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="mobile-header-root"></div>
<div id="toast-root"></div>
<div id="modal-root"></div>
<div class="app-layout">
  <div id="sidebar-root"></div>
  <div class="main-wrap">
    <div id="header-root"></div>
    <div class="page-body wide" style="animation:fadeUp .3s ease both;margin:0 auto;">
      <div class="tabs">
        <button class="tb active" onclick="showTab('plans',this)">プラン比較</button>
        <button class="tb" onclick="showTab('billing',this)">請求・支払い</button>
        <button class="tb" onclick="showTab('usage',this)">利用履歴</button>
      </div>

      <!-- Plans Tab -->
      <div id="tab-plans">
        <div class="ph">
          <div class="pt">プランを選ぶ</div>
          <div id="current-plan-note"></div>
        </div>
        <div class="grid3" style="gap:16px;margin-bottom:22px" id="plan-cards"></div>

        <!-- Pay as you go -->
        <div class="card" style="background:linear-gradient(135deg,var(--ink),var(--ink2));color:#fff">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px">
            <div>
              <div style="font-family:'Fraunces',serif;font-size:18px;font-weight:900;margin-bottom:4px">従量課金</div>
              <div style="font-size:12.5px;color:rgba(255,255,255,.5);max-width:400px;line-height:1.6">
                月間制限に達した後でも、1回¥50で会話を続けられます。使いすぎの心配がなく、必要なときだけご利用できます。
              </div>
            </div>
            <div style="text-align:center">
              <div style="font-family:'Fraunces',serif;font-size:32px;font-weight:900;color:var(--gold3)">¥50<span style="font-size:13px;font-weight:400;color:rgba(255,255,255,.4)">/回</span></div>
              <button id="payg-btn" class="btn btn-gold btn-sm" style="margin-top:6px" onclick="enablePayG()">従量課金を有効にする</button>
              <div id="payg-status" style="margin-top:6px;font-size:11px;color:rgba(255,255,255,.5);display:none"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Billing Tab -->
      <div id="tab-billing" style="display:none">
        <div class="grid2" style="gap:18px">
          <div>
            <div class="card" style="margin-bottom:14px">
              <div class="st">現在の支払い方法</div>
              <div style="display:flex;align-items:center;gap:11px;padding:11px;background:var(--cream2);border-radius:var(--r);margin-bottom:12px">
                <div style="width:44px;height:28px;background:#1a1f71;border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700">VISA</div>
                <div>
                  <div style="font-size:12.5px;font-weight:600">•••• •••• •••• 4242</div>
                  <div style="font-size:11px;color:var(--muted)">有効期限: 12/27</div>
                </div>
                <button class="btn btn-g btn-sm" style="margin-left:auto" onclick="changeCard()">変更</button>
              </div>
              <button class="btn btn-g btn-sm" onclick="addCard()">+ 別のカードを追加</button>
            </div>
            <div class="card">
              <div class="st">次回請求</div>
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div>
                  <div style="font-size:12.5px;color:var(--muted)">次回請求日</div>
                  <div style="font-size:13px;font-weight:600;color:var(--ink)">2025年6月1日</div>
                </div>
                <div style="text-align:right">
                  <div style="font-size:12.5px;color:var(--muted)">請求額</div>
                  <div id="next-billing" style="font-family:'Fraunces',serif;font-size:22px;font-weight:900;color:var(--gold)"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="st">請求履歴</div>
            <div id="billing-history"></div>
          </div>
        </div>
      </div>

      <!-- Usage Tab -->
      <div id="tab-usage" style="display:none">
        <div class="card" style="margin-bottom:18px">
          <div class="st">今月の利用状況</div>
          <div id="usage-detail-full"></div>
        </div>
        <div class="card">
          <div class="st">AI別使用回数（今月）</div>
          <div id="ai-usage-chart"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
buildMobileHeader("プラン", "dashboard.html"); buildMobileNav("plan");</script>
<script>
// planRank / _updatePlanCache: shared.js のキャッシュ問題に備え plan.html 内でも直接定義
if (typeof planRank === 'undefined') { var planRank = {free:0, pro:1, master:2}; }
function _updatePlanCache(res) {
  try {
    const u = (typeof getCachedUser === 'function' ? getCachedUser() : null) || {};
    if (res && res.user) {
      if (typeof setCachedUser === 'function') setCachedUser({ ...u, ...res.user });
    } else if (res) {
      u.plan = res.plan; u.usage_limit = res.limit; u.usage_count = 0;
      if (typeof setCachedUser === 'function') setCachedUser(u);
    }
  } catch(e) { console.warn('_updatePlanCache error', e); }
}
let user = null;

(async () => {
  user = await requireAuth()
  if(user) init()
})()

async function init() {
  buildSidebar('plan')
  // buildHeaderはvoid関数のため直接呼び出す（innerHTML代入は不可）
  buildHeader('プラン・課金', 'プランの確認・変更')
  // topbarに戻るボタン＋ナビゲーションボタンを追加
  const topbar = document.querySelector('.topbar')
  if (topbar) {
    const navBtns = document.createElement('div')
    navBtns.style.cssText = 'display:flex;align-items:center;gap:8px;margin-left:auto'
    navBtns.innerHTML = `
      <a href="javascript:history.back()" class="btn btn-g btn-sm" style="text-decoration:none;display:flex;align-items:center;gap:4px">
        <span style="font-size:14px">‹</span> 戻る
      </a>
      <a href="dashboard.html" class="btn btn-g btn-sm" style="text-decoration:none;display:flex;align-items:center;gap:4px">
        <span style="font-size:12px">⊞</span> ダッシュボード
      </a>
      <a href="chat.html?ai=all" class="btn btn-p btn-sm" style="text-decoration:none;display:flex;align-items:center;gap:4px">
        <span style="font-size:12px">✦</span> チャット
      </a>`
    topbar.appendChild(navBtns)
  }

  const plan = getPlanInfo(user.plan)
  const upgradeParam = new URLSearchParams(location.search).get('upgrade')
  if(upgradeParam && PLANS[upgradeParam]) {
    // プラン比較タブを表示
    document.querySelectorAll('.tb')[0].click()
    // 少し待ってからアップグレード確認モーダルを自動表示
    setTimeout(() => changePlan(upgradeParam), 300)
  }

  document.getElementById('current-plan-note').innerHTML = `
    <div class="alert a-i" style="margin:0"><span class="alert-icon">ℹ</span>現在のプラン: <strong>${plan.name}</strong> (¥${plan.price.toLocaleString()}/月・月${plan.limit}回)</div>`

  // Plan cards
  const planOrder = ['free','pro','master']
  document.getElementById('plan-cards').innerHTML = planOrder.map(p => {
    const info = PLANS[p]
    const isCurrent = user.plan === p
    const currentRank = planRank[user.plan] ?? 0
    const targetRank  = planRank[p] ?? 0
    const isUpgrade   = targetRank > currentRank
    const isDowngrade = targetRank < currentRank
    // おすすめ：freeならpro、proならmaster
    const isRec = (user.plan === 'free' && p === 'pro') || (user.plan === 'pro' && p === 'master')
    const feats = {
      free:   [{ok:true,t:'月10回の会話'},{ok:true,t:'全AIアシスタント'},{ok:false,t:'ホテル・決済連携'},{ok:false,t:'会話履歴保存'},{ok:false,t:'優先サポート'}],
      pro:    [{ok:true,t:'月50回の会話'},{ok:true,t:'全AIアシスタント'},{ok:true,t:'ホテル・決済連携'},{ok:true,t:'会話履歴保存'},{ok:false,t:'優先サポート'}],
      master: [{ok:true,t:'月200回の会話'},{ok:true,t:'全AIアシスタント'},{ok:true,t:'全機能アンロック'},{ok:true,t:'優先サポート'},{ok:true,t:'従量課金対応'}],
    }
    let btnHtml
    if (isCurrent) {
      btnHtml = `<button class="btn btn-g btn-w" disabled>現在のプラン</button>`
    } else if (isUpgrade) {
      const cls = p === 'master' ? 'btn-gold' : 'btn-p'
      btnHtml = `<button class="btn ${cls} btn-w" onclick="changePlan('${p}')">⬆ アップグレード</button>`
    } else {
      // ダウングレード（freeへの変更含む）
      btnHtml = `<button class="btn btn-g btn-w" onclick="changePlan('${p}')" style="color:var(--subtle)">↓ ダウングレード</button>`
    }
    return `
      <div class="plan-card${isCurrent?' current':isRec?' recommended':''}">
        ${isCurrent ? '<div class="plan-badge-top curr">現在のプラン</div>'
                    : isRec ? '<div class="plan-badge-top rec">おすすめ</div>' : ''}
        <div class="plan-name">${info.name}</div>
        <div class="plan-price">¥${info.price.toLocaleString()}<span>/月</span></div>
        <div style="font-size:11px;color:var(--subtle)">月${info.limit}回まで</div>
        <ul class="feat-list">
          ${feats[p].map(f=>`<li><span class="feat-check ${f.ok?'ok':'no'}">${f.ok?'✓':'—'}</span>${f.t}</li>`).join('')}
        </ul>
        ${btnHtml}
      </div>`
  }).join('')

  // Billing
  document.getElementById('next-billing').textContent = `¥${plan.price.toLocaleString()}`
  const months = ['2025年4月','2025年3月','2025年2月','2025年1月']
  document.getElementById('billing-history').innerHTML = months.map((m,i) => `
    <div class="history-row">
      <div><div style="font-size:12.5px;color:var(--ink3)">${m}</div><div style="font-size:11px;color:var(--subtle)">${plan.name}プラン</div></div>
      <div style="text-align:right"><div style="font-weight:600">¥${plan.price.toLocaleString()}</div><button class="btn btn-g btn-sm">領収書</button></div>
    </div>`).join('')

  // Usage detail — use usage_count / usage_limit (correct API field names)
  const usedCount  = user.usage_count ?? user.used ?? 0
  const limitCount = user.usage_limit ?? user.limit ?? getPlanInfo(user.plan).limit
  const pct = Math.min(100, Math.round(usedCount / limitCount * 100))
  const progCls = pct>=90?'dngr':pct>=70?'warn':''
  document.getElementById('usage-detail-full').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span>今月の会話数: <strong>${usedCount} / ${limitCount}回</strong></span>
      <span class="badge ${pct>=90?'b-red':pct>=70?'b-gold':'b-green'}">${pct}% 使用</span>
    </div>
    <div class="prog-wrap" style="height:10px"><div class="prog ${progCls}" style="width:${pct}%"></div></div>
    <div style="font-size:11px;color:var(--subtle);margin-top:6px">残り${Math.max(0,limitCount-usedCount)}回 · 月末リセット</div>`

  // AI usage bars — fetch real data from /api/usage-stats
  const AI_META = {
    all:      {name:'総合AI',   icon:'✦'},
    general:  {name:'総合AI',   icon:'✦'},
    travel:   {name:'旅行AI',   icon:'✈️'},
    recipe:   {name:'料理AI',   icon:'🍳'},
    shopping: {name:'買い物AI', icon:'🛍️'},
    health:   {name:'健康AI',   icon:'💚'},
    appliance:{name:'家電AI',   icon:'📺'},
    gourmet:  {name:'グルメAI', icon:'🍽️'},
    diy:      {name:'DIY AI',   icon:'🔨'},
  }
  const AI_ORDER = ['all','general','travel','recipe','gourmet','shopping','appliance','health','diy']
  const chartEl = document.getElementById('ai-usage-chart')
  chartEl.innerHTML = '<div style="color:var(--muted);font-size:12px">読み込み中…</div>'
  try {
    const statsRes = await apiRequest('/usage-stats?days=30')
    const now = new Date()
    const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`
    const totals = {}
    for(const row of (statsRes.stats||[])) {
      if(!row.date || !row.date.startsWith(thisMonth)) continue
      const key = row.ai_type || 'general'
      totals[key] = (totals[key]||0) + (row.msg_count||0)
    }
    const totalAll = Object.values(totals).reduce((s,v)=>s+v, 0)
    // ai_type ごとの集計をラベルに変換（general/all は「総合AI」にまとめる）
    const merged = {}
    for(const [k,v] of Object.entries(totals)) {
      const meta = AI_META[k]; if(!meta) continue
      merged[meta.name] = {icon:meta.icon, used:(merged[meta.name]?.used||0)+v}
    }
    const seen = new Set()
    const aiUsage = AI_ORDER
      .map(k => AI_META[k] ? {name:AI_META[k].name, icon:AI_META[k].icon, used:merged[AI_META[k].name]?.used||0} : null)
      .filter(r => r && !seen.has(r.name) && seen.add(r.name))
      .filter(r => r.used > 0)
    if(aiUsage.length === 0) {
      chartEl.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px 0">今月の利用データがまだありません</div>'
    } else {
      chartEl.innerHTML = aiUsage.map(a => `
        <div style="display:flex;align-items:center;gap:11px;margin-bottom:10px">
          <div style="width:72px;font-size:12px;color:var(--muted);white-space:nowrap">${a.icon} ${a.name}</div>
          <div class="prog-wrap" style="flex:1"><div class="prog" style="width:${totalAll>0?Math.round(a.used/totalAll*100):0}%"></div></div>
          <div style="width:36px;text-align:right;font-size:12px;font-weight:600;color:var(--ink3)">${a.used}回</div>
        </div>`).join('')
    }
  } catch(e) {
    chartEl.innerHTML = '<div style="color:var(--muted);font-size:12px">データの取得に失敗しました</div>'
  }
}

function showTab(id, btn) {
  document.querySelectorAll('[id^="tab-"]').forEach(t=>t.style.display='none')
  document.getElementById('tab-'+id).style.display='block'
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'))
  btn.classList.add('active')
}

function changePlan(plan) {
  const info   = PLANS[plan]
  const isUp   = (planRank[plan] ?? 0) > (planRank[user.plan] ?? 0)
  const notice = isUp
    ? '✅ 今すぐ適用されます。追加の会話が可能になります。'
    : '⚠️ 次回更新日（月末）から適用されます。現在の請求期間はそのまま利用できます。'
  showModal({
    title: isUp ? `⬆ ${info.name}にアップグレード` : `↓ ${info.name}にダウングレード`,
    body: `<p style="font-size:12.5px;color:var(--muted);line-height:1.8">
      <strong>${PLANS[user.plan].name}</strong> → <strong>${info.name}</strong> へのプラン変更<br>
      月額: <strong>¥${info.price.toLocaleString()}</strong> · 月<strong>${info.limit}回</strong>まで会話可能<br><br>
      <span style="font-size:12px">${notice}</span>
    </p>`,
    actions: [
      {label:'キャンセル', cls:'btn-g', fn:'closeModal()'},
      {label:`${info.name}に変更する`, cls:'btn-gold', fn:`applyPlan('${plan}')`},
    ]
  })
}

// _getStripe / _updatePlanCache は shared.js で定義済みのものを使用

async function applyPlan(plan) {
  const info = PLANS[plan]
  const isUpgrade = (planRank[plan] ?? 0) > (planRank[user.plan] ?? 0)
  const btn = document.querySelector('.m-foot .btn-gold')
  if (btn) { btn.disabled = true; btn.textContent = '処理中...' }

  try {
    const res = await apiRequest('/user/plan', { method: 'PUT', body: { plan } })

    // ── カード情報入力が必要（新規サブスク・初回）──
    if (res.requires_payment_method) {
      closeModal()
      await _showCardInputModal(plan, res.setup_intent_client_secret, res.customer_id)
      return
    }

    // ── 3Dセキュア等の追加認証が必要 ──
    if (res.requires_action) {
      closeModal()
      const stripe = await _getStripe()
      if (!stripe) { toast('Stripe未設定です', 'd'); return }
      const { error } = await stripe.confirmCardPayment(res.payment_intent_client_secret)
      if (error) {
        toast(error.message || '認証に失敗しました', 'd')
        return
      }
      toast(`${info.name}プランへのアップグレードが完了しました！`, 's')
      _updatePlanCache(res)
      setTimeout(() => location.reload(), 900)
      return
    }

    // ── 即時完了（ダウングレード・既存サブスク更新）──
    _updatePlanCache(res)
    closeModal()
    const dir = res.direction === 'upgrade' ? 'アップグレード' : 'プラン変更'
    toast(`${info.name}プランへの${dir}が完了しました！`, 's')
    setTimeout(() => location.reload(), 900)

  } catch (e) {
    closeModal()
    toast(e.error || 'プラン変更に失敗しました', 'd')
    if (btn) { btn.disabled = false; btn.textContent = `${info.name}に変更する` }
  }
}

// _updatePlanCache は shared.js で定義済み

async function _showCardInputModal(plan, clientSecret, customerId) {
  const stripe = await _getStripe()
  if (!stripe) {
    toast('決済システムが利用できません。管理者にお問い合わせください', 'd')
    return
  }
  const info = PLANS[plan]

  showModal({
    title: `💳 お支払い情報の入力`,
    wide: true,
    body: `
      <p style="font-size:12.5px;color:var(--muted);margin-bottom:14px;line-height:1.7">
        <strong>${info.name}プラン</strong>（¥${info.price.toLocaleString()}/月）のお支払い情報を入力してください。<br>
        カード情報はStripeによって安全に処理されます。当システムのサーバーには保存されません。
      </p>
      <div id="stripe-card-element" style="border:1px solid var(--border);border-radius:8px;padding:12px;background:var(--surface);margin-bottom:8px"></div>
      <div id="stripe-card-error" style="color:#ef4444;font-size:12px;min-height:18px;margin-top:4px"></div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:4px">
        🔒 SSL暗号化・Stripeによる安全な処理
      </div>`,
    actions: [
      { label: 'キャンセル', cls: 'btn-g', fn: 'closeModal()' },
      { label: `${info.name}プランを開始する`, cls: 'btn-gold', fn: `_submitCard('${plan}','${clientSecret}','${customerId}')` },
    ]
  })

  // Stripeのカード入力UIをマウント
  setTimeout(() => {
    const elements = stripe.elements()
    window._stripeCardElement = elements.create('card', {
      style: {
        base: { fontSize: '14px', color: 'var(--ink, #333)', fontFamily: 'inherit' }
      }
    })
    window._stripeCardElement.mount('#stripe-card-element')
    window._stripeCardElement.on('change', e => {
      document.getElementById('stripe-card-error').textContent = e.error ? e.error.message : ''
    })
  }, 100)
}

async function _submitCard(plan, clientSecret, customerId) {
  const stripe = await _getStripe()
  const btn = document.querySelector('.m-foot .btn-gold')
  if (btn) { btn.disabled = true; btn.textContent = '処理中...' }

  try {
    // SetupIntentでカードを確認・保存
    const { setupIntent, error } = await stripe.confirmCardSetup(clientSecret, {
      payment_method: { card: window._stripeCardElement }
    })

    if (error) {
      document.getElementById('stripe-card-error').textContent = error.message
      if (btn) { btn.disabled = false; btn.textContent = `${PLANS[plan].name}プランを開始する` }
      return
    }

    // payment_method_idをサーバーに渡してサブスク作成
    const res = await apiRequest('/user/plan', {
      method: 'PUT',
      body: { plan, payment_method_id: setupIntent.payment_method }
    })

    if (res.requires_action) {
      const { error: confirmError } = await stripe.confirmCardPayment(res.payment_intent_client_secret)
      if (confirmError) {
        toast(confirmError.message || '認証に失敗しました', 'd')
        closeModal()
        return
      }
    }

    _updatePlanCache(res)
    closeModal()
    toast(`${PLANS[plan].name}プランへのアップグレードが完了しました！`, 's')
    setTimeout(() => location.reload(), 900)

  } catch(e) {
    toast(e.error || '決済に失敗しました', 'd')
    if (btn) { btn.disabled = false; btn.textContent = `${PLANS[plan].name}プランを開始する` }
  }
}

// 従量課金の有効/無効 状態管理
let _paygEnabled = false

function enablePayG() {
  const btn = document.getElementById('payg-btn')
  const status = document.getElementById('payg-status')
  if (_paygEnabled) {
    // 無効化確認
    showModal({
      title: '従量課金を無効にする',
      body: '<p style="font-size:13.5px;line-height:1.7;color:var(--ink3)">従量課金を無効にすると、月間制限に達した後は会話できなくなります。</p>',
      actions: [
        {label:'キャンセル', cls:'btn-g', fn:'closeModal()'},
        {label:'無効にする', cls:'btn-red', fn:'_applyPayG(false)'},
      ]
    })
  } else {
    // 有効化確認
    showModal({
      title: '従量課金を有効にする',
      body: `<p style="font-size:13.5px;line-height:1.7;color:var(--ink3)">月間制限（${getPlanInfo(user.plan).limit}回）に達した後も、<strong>1回¥50</strong>で会話を続けることができます。<br>上限はなく、使った分だけ翌月請求されます。</p>`,
      actions: [
        {label:'キャンセル', cls:'btn-g', fn:'closeModal()'},
        {label:'有効にする', cls:'btn-gold', fn:'_applyPayG(true)'},
      ]
    })
  }
}

function _applyPayG(enable) {
  closeModal()
  _paygEnabled = enable
  const btn = document.getElementById('payg-btn')
  const status = document.getElementById('payg-status')
  if (enable) {
    btn.textContent = '従量課金を無効にする'
    btn.style.background = 'rgba(255,255,255,0.15)'
    btn.style.color = '#fff'
    btn.style.borderColor = 'rgba(255,255,255,0.3)'
    if (status) { status.style.display='block'; status.innerHTML = '✓ 有効中 — 制限超過後、¥50/回で継続できます' }
    toast('従量課金を有効にしました。制限到達後、¥50/回で会話できます。', 's')
  } else {
    btn.textContent = '従量課金を有効にする'
    btn.style.background = ''
    btn.style.color = ''
    btn.style.borderColor = ''
    btn.classList.remove('btn-g')
    btn.classList.add('btn-gold')
    if (status) { status.style.display='none'; status.textContent = '' }
    toast('従量課金を無効にしました。', '')
  }
}

// フォールバック・予算警告バナーをページロード時に確認
document.addEventListener('DOMContentLoaded', async ()=>{
  try {
    const d = await fetch('/api/system/status').then(r=>r.json())
    const level = d.fallback_mode ? 'critical' : (d.budget_warning || 'none')
    if(level !== 'none' && typeof _applyBanner === 'function') _applyBanner(level)
  } catch(e){}
})
