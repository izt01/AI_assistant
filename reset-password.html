<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<title>パスワード再設定 — Lumina AI</title>
<style>body{background:var(--ink)}</style>
</head>
<body>
<div id="toast-root"></div>
<div class="auth-layout">
  <div class="auth-panel">
    <div class="auth-panel-orb ap-orb1"></div>
    <div class="auth-panel-orb ap-orb2"></div>
    <div class="ap-grid"></div>
    <div class="ap-content">
      <div class="ap-logo"><div class="ap-logo-icon">✦</div>Lumina AI</div>
      <div class="ap-title">新しいパスワードを<br>設定してください</div>
      <p class="ap-desc">安全のため、推測されにくいパスワードを設定してください。</p>
      <div class="ap-feature"><div class="ap-feat-icon">🔐</div><div class="ap-feat-text">8文字以上・英数字・記号の組み合わせを推奨</div></div>
      <div class="ap-feature"><div class="ap-feat-icon">⚡</div><div class="ap-feat-text">設定後すぐにログインできます</div></div>
    </div>
  </div>
  <div class="auth-right">
    <div class="form-box">
      <div class="form-logo"><div class="form-logo-gem">✦</div>Lumina</div>

      <div id="screen-form">
        <div class="fh">新しいパスワード設定</div>
        <p class="fsub">新しいパスワードを入力してください</p>
        <div class="field">
          <label class="lbl">新しいパスワード<span class="req">*</span></label>
          <input class="inp" id="pw" type="password" placeholder="8文字以上" oninput="checkPw(this.value)">
          <div class="pw-bars"><div class="pw-bar" id="b0"></div><div class="pw-bar" id="b1"></div><div class="pw-bar" id="b2"></div><div class="pw-bar" id="b3"></div></div>
          <div class="pw-str" id="pw-str">—</div>
        </div>
        <div class="field">
          <label class="lbl">パスワード（確認）<span class="req">*</span></label>
          <input class="inp" id="pw2" type="password" placeholder="もう一度入力">
        </div>
        <button class="btn btn-gold btn-w btn-lg" onclick="doReset()">パスワードを変更する</button>
        <div class="ff"><a href="login.html" class="flink">← ログインに戻る</a></div>
      </div>

      <div id="screen-done" style="display:none">
        <div class="suc-wrap">
          <div class="suc-icon">✓</div>
          <div class="fh" style="text-align:center">パスワードを変更しました</div>
          <p class="fsub" style="text-align:center">新しいパスワードでログインしてください</p>
          <button class="btn btn-gold btn-w btn-lg" onclick="location.href='login.html'">ログインする →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token')
if(!token) { toast('無効なリンクです','d') }

function checkPw(v) {
  const bars=[0,1,2,3].map(i=>document.getElementById('b'+i))
  bars.forEach(b=>{b.className='pw-bar'})
  const str=document.getElementById('pw-str')
  if(!v){str.textContent='—';return}
  let s=0
  if(v.length>=8)s++
  if(/[A-Z]/.test(v)||/[a-z]/.test(v))s++
  if(/\d/.test(v))s++
  if(/[^a-zA-Z\d]/.test(v))s++
  const labels=['弱い','やや弱い','普通','強い'],cls=['w','w','m','s']
  for(let i=0;i<s;i++) bars[i].classList.add(cls[s-1])
  str.textContent=labels[s-1]||'—'
}

function doReset() {
  const pw=document.getElementById('pw').value
  const pw2=document.getElementById('pw2').value
  if(pw.length<8){toast('8文字以上で入力してください','d');return}
  if(pw!==pw2){toast('パスワードが一致しません','d');return}
  document.getElementById('screen-form').style.display='none'
  document.getElementById('screen-done').style.display='block'
}
</script>
</body>
</html>
