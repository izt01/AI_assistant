<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<title>チャット — Lumina AI</title>
<style>
.chat-shell{display:flex;flex-direction:column;height:calc(100vh - var(--hh));overflow:hidden}
.chat-topbar{padding:12px 18px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:11px;flex-shrink:0}
.chat-ai-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.chat-ai-name{font-family:'Fraunces',serif;font-size:16px;font-weight:900;color:var(--ink);letter-spacing:-.02em}
.chat-ai-desc{font-size:11px;color:var(--muted)}
.chat-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;background:var(--cream)}
.chat-input-area{padding:14px 18px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.chat-input-row{display:flex;gap:9px;align-items:flex-end}
.chat-input-row textarea{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13px;font-family:inherit;resize:none;min-height:44px;max-height:120px;background:var(--cream);transition:all .15s;outline:none;line-height:1.5}
.chat-input-row textarea:focus{border-color:var(--gold2);box-shadow:0 0 0 3px rgba(201,168,76,.1);background:var(--surface)}
.send-btn{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;transition:all .16s;border:none;font-weight:700}
.send-btn:hover{box-shadow:0 4px 14px rgba(201,168,76,.3);transform:scale(1.06)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.msg-row{display:flex;align-items:flex-start;gap:9px}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.msg-bubble{max-width:82%;padding:11px 14px;border-radius:16px;font-size:13px;line-height:1.65}
.msg-row.ai .msg-bubble{background:var(--surface);border:1px solid var(--border);color:var(--ink3);border-radius:4px 16px 16px 16px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.msg-row.user .msg-bubble{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border-radius:16px 4px 16px 16px;font-weight:500}
.msg-time{font-size:10px;color:var(--subtle);margin-top:4px;text-align:right}
.typing-indicator{display:flex;gap:5px;align-items:center;padding:11px 14px}
.ty-dot{width:8px;height:8px;border-radius:50%;background:var(--subtle);animation:ty 1.2s ease infinite}
.ty-dot:nth-child(2){animation-delay:.2s}
.ty-dot:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
/* Action chips */
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:99px;padding:5px 12px;font-size:11.5px;color:var(--gold);cursor:pointer;transition:all .15s}
.chip:hover{background:rgba(201,168,76,.15)}
/* Redirect modal */
.redirect-card{background:var(--cream2);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-top:10px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .18s}
.redirect-card:hover{border-color:var(--gold2);background:rgba(201,168,76,.04)}
/* Usage badge */
.usage-badge{background:var(--cream2);border:1px solid var(--border);border-radius:99px;padding:4px 11px;font-size:11px;color:var(--muted);white-space:nowrap}
.usage-badge.warn{background:var(--warningbg);border-color:rgba(217,119,6,.25);color:#92400e}
.usage-badge.dngr{background:var(--dangerbg);border-color:rgba(220,38,38,.25);color:#991b1b}
/* Feedback */
.fb-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;align-items:center}
.fb-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .14s;font-family:inherit}
.fb-btn:hover{background:var(--cream2)}
.fb-btn.active{background:var(--successbg);border-color:rgba(5,150,105,.2);color:var(--success)}
.fb-btn.reaction-love.active{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:#dc2626}
.fb-btn.reaction-helpful.active{background:var(--successbg);border-color:rgba(5,150,105,.2);color:var(--success)}
.fb-btn.reaction-neg.active{background:var(--warningbg);border-color:rgba(217,119,6,.25);color:#92400e}
.fb-done-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border:none;border-radius:8px;padding:4px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .14s}
.fb-done-btn:hover{opacity:.88}
.fb-sep{width:1px;height:16px;background:var(--border);margin:0 2px}
.fav-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .14s;font-family:inherit}
.fav-btn:hover{background:rgba(220,38,38,.05);border-color:rgba(220,38,38,.3);color:#dc2626}
.fav-btn.saved{background:rgba(220,38,38,.07);border-color:rgba(220,38,38,.3);color:#dc2626}
.rest-card{position:relative}
.rest-fav{position:absolute;top:8px;right:30px;background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;transition:all .14s;color:var(--muted)}
.rest-fav:hover,.rest-fav.saved{color:#dc2626;border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.06)}
/* 商品カード */
.product-cards{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .18s;position:relative}
.product-card:hover{border-color:var(--gold2);box-shadow:0 4px 20px rgba(201,168,76,.12);transform:translateY(-1px)}
.product-card-inner{display:flex;gap:0;align-items:stretch}
.product-img-wrap{width:90px;flex-shrink:0;background:var(--cream2);overflow:hidden}
.product-img{width:90px;height:90px;object-fit:cover}
.product-img-placeholder{width:90px;height:90px;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--cream2)}
.product-body{flex:1;min-width:0;padding:11px 38px 11px 12px}
.product-rank{position:absolute;top:8px;left:8px;width:20px;height:20px;background:var(--ink);color:#fff;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.product-name{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:5px}
.product-catch{font-size:10.5px;color:var(--muted);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.product-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.product-price{font-family:'Fraunces',serif;font-size:16px;font-weight:900;color:var(--gold)}
.product-shop{font-size:10.5px;color:var(--subtle);padding:2px 6px;background:var(--cream2);border-radius:4px}
.product-review{font-size:10.5px;color:var(--muted)}
.product-point{font-size:10px;color:#dc2626;font-weight:600}
.product-fav{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .14s;color:var(--muted)}
.product-fav:hover,.product-fav.saved{color:#dc2626;border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.06)}
/* 商品詳細モーダル */
.prod-detail-img{width:100%;max-height:200px;object-fit:contain;border-radius:8px;background:var(--cream2);margin-bottom:14px}
.prod-detail-price{font-family:'Fraunces',serif;font-size:24px;font-weight:900;color:var(--gold);margin-bottom:8px}
.prod-detail-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.prod-detail-tag{font-size:11.5px;padding:3px 9px;border-radius:6px;background:var(--cream2);color:var(--muted)}
/* 比較表 */
.compare-wrap{margin-top:12px;overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
.compare-table{width:100%;border-collapse:collapse;font-size:12px}
.compare-table th{background:var(--ink);color:#fff;padding:8px 10px;text-align:left;font-weight:600;white-space:nowrap}
.compare-table td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.compare-table tr:last-child td{border-bottom:none}
.compare-table tr:hover td{background:var(--cream2)}
.compare-table .best{color:var(--success);font-weight:700}
.compare-table .rank1{background:rgba(201,168,76,.06)}
/* ホテルカード */
.hotel-cards{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.hotel-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;transition:all .15s;position:relative}
.hotel-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.hotel-name{font-family:'Fraunces',serif;font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:5px}
.hotel-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--muted);margin-bottom:6px}
.hotel-price{font-family:'Fraunces',serif;font-size:14px;font-weight:700;color:var(--gold)}
.hotel-access{font-size:11px;color:var(--subtle);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hotel-fav{position:absolute;top:10px;right:10px;background:transparent;border:none;font-size:15px;cursor:pointer;color:var(--muted);transition:all .14s;padding:2px}
.hotel-fav:hover,.hotel-fav.saved{color:#dc2626}
</style>
</head>
<body>
<div id="mobile-header-root"></div>
<div id="toast-root"></div>
<div id="modal-root"></div>
<div class="app-layout">
  <div id="sidebar-root"></div>
  <div class="main-wrap">
    <div id="header-root"></div>
    <div class="chat-shell">
      <div class="chat-topbar" id="chat-topbar"></div>
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-input-area">
        <div id="limit-warn" style="display:none;margin-bottom:8px"></div>
        <div class="chat-input-row">
          <textarea id="chat-input" placeholder="メッセージを入力…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMsg()">↑</button>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:7px">
          <span style="font-size:10.5px;color:var(--subtle)">Enterで送信 · Shift+Enterで改行</span>
          <span class="usage-badge" id="usage-badge"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Feedback modal -->
<div id="fb-modal" style="display:none;position:fixed;bottom:90px;right:22px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow2);z-index:100;width:280px;animation:fadeUp .2s ease">
  <div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:10px">AIの回答はいかがでしたか？</div>
  <div style="display:flex;flex-direction:column;gap:7px" id="fb-options"></div>
  <button class="btn btn-g btn-sm" style="margin-top:10px;width:100%" onclick="closeFb()">送信して閉じる</button>
</div>

<script src="shared.js"></script>
<script>

const _aiParam = new URLSearchParams(location.search).get('ai') || 'all';
const _aiNames = {all:'総合AI',travel:'旅行AI',cooking:'料理AI',shopping:'買い物AI',diy:'DIY AI',home:'家電AI',health:'健康AI'};
buildMobileHeader(_aiNames[_aiParam]||'チャット', 'dashboard.html',
  '<button class="mh-action" onclick="clearChat()" title="リセット" style="font-size:16px">↺</button>');
buildMobileNav("chat");
</script>
<script>
// ─── 初期化（非同期）────────────────────────────────────────
let user = null
const aiParam = new URLSearchParams(location.search).get('ai') || 'all'

const AI_CONFIG = {
  all:      {icon:'✦',  name:'総合チャット AI',   desc:'なんでもお任せください。最適なAIへご案内します',  color:'#c9a84c', bg:'rgba(201,168,76,.12)',
    greetings:['こんにちは！何でもお気軽にご相談ください。グルメ・旅行・料理・買い物・DIY・家電・健康など、あなたのご要望に合わせて最適なAIをご案内します✨','今日はどんなことでお手伝いできますか？お気軽にどうぞ！']},
  gourmet:  {icon:'🍽️', name:'グルメ AI',        desc:'食べたいものからお店を探す・飲食店提案',         color:'#f97316', bg:'rgba(249,115,22,.12)',
    greetings:['何を食べたいですか？🍽️\nお腹のすき加減やジャンル、雰囲気を教えていただければ近くのおすすめのお店をご紹介します！','今日のランチ・ディナーはどこに行きますか？気分を教えてくれれば、ぴったりのお店を探します😊']},
  travel:   {icon:'✈️', name:'旅行 AI',           desc:'旅程作成・ホテル提案・観光スポット案内',          color:'#6495ed', bg:'rgba(100,149,237,.12)',
    greetings:['旅行の計画をお手伝いします！✈️\n行き先、旅行期間、ご予算などを教えていただければ、最適なプランを提案します。','どんな旅行をご計画ですか？国内・海外、どちらもお任せください！']},
  cooking:  {icon:'🍳', name:'料理 AI',           desc:'レシピ提案・献立作成・買い物リスト生成',          color:'#ffa500', bg:'rgba(255,165,0,.12)',
    greetings:['料理のお手伝いをします！🍳\n「冷蔵庫にある食材」や「食べたいもの」を教えていただければ、レシピをご提案します。','今日は何を作りますか？食材を教えていただければ、美味しいレシピをご提案します！']},
  shopping: {icon:'🛍️',name:'買い物 AI',         desc:'商品比較・価格調査・おすすめ商品提案',            color:'#32cd32', bg:'rgba(50,205,50,.12)',
    greetings:['買い物のお手伝いをします！🛍️\n探している商品や予算を教えていただければ、最適な選択肢をご提案します。','何をお探しですか？予算と用途を教えていただければ、コスパの良い商品をご紹介します！']},
  diy:      {icon:'🔨', name:'DIY AI',            desc:'修繕方法・作業手順・必要材料リスト',              color:'#ff6347', bg:'rgba(255,99,71,.12)',
    greetings:['DIY・修繕のお手伝いをします！🔨\n何を作りたい・直したいか教えていただければ、手順と必要な道具をご説明します。','どんなDIYプロジェクトですか？初心者の方でも安心してお任せください！']},
  home:     {icon:'📺', name:'家電・インテリア AI',desc:'家電選び・部屋コーディネート・商品紹介',          color:'#9370db', bg:'rgba(147,112,219,.12)',
    greetings:['家電・インテリアのお手伝いをします！🏠\nお部屋のサイズや予算、好みのスタイルを教えていただければ、最適な提案をします。','どんなお部屋を作りたいですか？ご予算とご希望をお聞かせください！']},
  health:   {icon:'💚', name:'健康 AI',           desc:'生活習慣改善・ウェルネスアドバイス ※医療診断は行いません',color:'#00ced1', bg:'rgba(0,206,209,.12)',
    greetings:['健康・ウェルネスのお手伝いをします💚\n※医療診断は行いません。生活習慣の改善や健康的な習慣づくりをサポートします。','健康についてお気軽にご相談ください。生活習慣の改善から食事・運動まで幅広くアドバイスします！']},
}

const ai = AI_CONFIG[aiParam] || AI_CONFIG.all
let messages = []   // {role, content}
let isTyping = false
let fbPending = null
let currentSessionId = null
let lastMessageId  = null
let lastProposalId = null
let lastReactionDone = false

// 非同期で認証してから初期化
requireAuth().then(u => { if(u){ user=u; init() } })

function init() {
  buildSidebar('chat-'+aiParam)
  buildHeader('AIチャット')

  // Topbar
  document.getElementById('chat-topbar').innerHTML = `
    <div class="chat-ai-icon" style="background:${ai.bg}">${ai.icon}</div>
    <div style="flex:1">
      <div class="chat-ai-name">${ai.name}</div>
      <div class="chat-ai-desc">${ai.desc}</div>
    </div>
    <div style="display:flex;gap:7px;align-items:center">
      <button class="btn btn-g btn-sm" onclick="clearChat()">会話をリセット</button>
      ${aiParam!=='all'?`<button class="btn btn-sm" style="background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);color:var(--gold)" onclick="location.href='chat.html?ai=all'">✦ 総合AIへ</button>`:''}
    </div>`

  updateUsageBadge()

  // Greeting
  const greeting = ai.greetings[Math.floor(Math.random()*ai.greetings.length)]
  addMessage('ai', greeting)

  // Quick chips
  const chips = getChips(aiParam)
  if(chips.length) {
    const chipRow = document.createElement('div')
    chipRow.className = 'chip-row'
    chipRow.innerHTML = chips.map(c => `<div class="chip" onclick="sendChip('${c}')">${c}</div>`).join('')
    document.getElementById('chat-msgs').appendChild(chipRow)
  }
}

function getChips(ai) {
  const c = {
    all:['旅行の計画を立てたい','美味しいレシピを教えて','おすすめの家電は？','DIYを始めたい'],
    travel:['国内旅行を計画したい','海外旅行に行きたい','ホテルを探したい','観光スポットを教えて'],
    cooking:['今日の夕食は何にする？','簡単なレシピを教えて','食材から料理を考えて','週の献立を作って'],
    shopping:['コスパのいい商品を探したい','家電を買い替えたい','プレゼントを探したい','比較してほしい'],
    diy:['棚を自作したい','壁の穴を修繕したい','ペンキ塗りのコツは？','必要な道具を教えて'],
    home:['リビングを模様替えしたい','省エネ家電を探したい','北欧インテリアにしたい','収納を増やしたい'],
    health:['運動習慣をつけたい','食事改善のアドバイス','睡眠を改善したい','ストレス解消法を教えて'],
  }
  return c[ai] || []
}

function sendChip(text) {
  if((text==='比較表を作る'||text==='比較表')&&typeof _lastProducts!=='undefined'&&_lastProducts.length>0){showCompareTable();return}
  document.getElementById('chat-input').value = text; sendMsg()
}

function addMessage(role, text) {
  const el = document.createElement('div')
  el.className = `msg-row ${role}`
  const timeStr = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})
  if(role === 'ai') {
    const msgIndex = messages.length
    el.innerHTML = `
      <div class="msg-avatar" style="background:${ai.bg}">${ai.icon}</div>
      <div>
        <div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>
        <div class="fb-row" data-msg-idx="${msgIndex}">
          <button class="fb-btn reaction-love"   onclick="giveReaction(this,'love')">🩷 最高</button>
          <button class="fb-btn reaction-helpful" onclick="giveReaction(this,'helpful')">👍 役立った</button>
          <button class="fb-btn reaction-neg"     onclick="showNegReactionModal(this)">👎 改善点</button>
          <div class="fb-sep"></div>
          <button class="fav-btn" onclick="saveMsgAsFavorite(this)">♡ お気に入り</button>
          <button class="fb-done-btn"             onclick="showDoneModal(this)">✓ やってみた</button>
        </div>
      </div>`
  } else {
    const initials = (user.name||'U')[0]
    el.innerHTML = `
      <div>
        <div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>
        <div class="msg-time">${timeStr}</div>
      </div>
      <div class="msg-avatar" style="background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);font-weight:700">${initials}</div>`
  }
  document.getElementById('chat-msgs').appendChild(el)
  scrollBottom()
}

function showTyping() {
  const el = document.createElement('div')
  el.className = 'msg-row ai'; el.id = 'typing-row'
  el.innerHTML = `
    <div class="msg-avatar" style="background:${ai.bg}">${ai.icon}</div>
    <div class="msg-bubble" style="background:var(--surface);border:1px solid var(--border);padding:12px 16px">
      <div class="typing-indicator"><div class="ty-dot"></div><div class="ty-dot"></div><div class="ty-dot"></div></div>
    </div>`
  document.getElementById('chat-msgs').appendChild(el)
  scrollBottom()

function hideTyping() {
  const el = document.getElementById('typing-row')
  if(el) el.remove()
}

function scrollBottom() {
  const c = document.getElementById('chat-msgs')
  setTimeout(()=>c.scrollTop = c.scrollHeight, 50)
}

function updateUsageBadge() {
  const u = getUser() || {}
  const limit = u.usage_limit || PLANS[u.plan]?.limit || 10
  const used  = u.usage_count || 0
  const remaining = Math.max(0, limit - used)
  const pct = Math.min(100, Math.round(used / limit * 100))
  const badge = document.getElementById('usage-badge')
  if (!badge) return
  badge.className = 'usage-badge' + (pct>=90?' dngr':pct>=70?' warn':'')
  badge.textContent = `残り${remaining}回`
}

function handleKey(e) {
  if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg() }
}

function autoResize(el) {
  el.style.height='auto'
  el.style.height=Math.min(el.scrollHeight, 120)+'px'
}

async function sendMsg() {
  const input = document.getElementById('chat-input')
  const text = input.value.trim()
  if(!text || isTyping) return

  const limit = PLANS[user?.plan]?.limit || 10
  if((user?.usage_count||0) >= limit) {
    if(user?.plan==='master') showLimitReachedModal()
    else showUpgradeModal(user?.plan)
    return
  }

  input.value = ''
  input.style.height = 'auto'
  document.getElementById('send-btn').disabled = true
  isTyping = true
  document.querySelectorAll('.chip-row').forEach(e=>e.remove())

  // APIに送るメッセージ配列（role/content形式）に追加
  messages.push({ role:'user', content:text })
  addMessage('user', text)
  showTyping()

  try {
    const resp = await apiRequest('/chat', {
      method: 'POST',
      body: {
        ai_type:    aiParam,
        messages:   messages,
        session_id: currentSessionId,
        lat:        window._userLat || null,
        lng:        window._userLng || null,
      }
    })

    hideTyping()
    currentSessionId = resp.session_id
    lastMessageId    = resp.message_id
    lastProposalId   = resp.proposal_id || null
    lastReactionDone = false

    const reply = resp.reply || ''
    messages.push({ role:'assistant', content:reply })
    addMessage('ai', reply)

    if(resp.learning_applied > 0) {
      toast(`✦ AIがあなたの好みを${resp.learning_applied}件学習しました`, '')
    }

    // キャッシュのusage_countを更新
    if(user) { user.usage_count = resp.usage_count || (user.usage_count||0)+1; setCachedUser(user) }

    // AIカード描画（extra内のtool結果を種別ごとに描画）
    if (resp.extra) {
      if (aiParam === 'gourmet' && resp.extra._places) handleGourmetExtra(resp.extra)
      if (resp.extra._products) renderProductCards(resp.extra._products.items || [])
      if (resp.extra._hotels)   renderHotelCards(resp.extra._hotels.hotels || [])
    }
    addActionChips(aiParam, text)
    updateUsageBadge()

  } catch(e) {
    hideTyping()
    if(e.error === 'usage_limit_reached') {
      if(user?.plan==='master') showLimitReachedModal()
      else showUpgradeModal(user?.plan)
    } else {
      addMessage('ai', '申し訳ありません。エラーが発生しました。しばらくしてから再度お試しください。')
      toast('エラーが発生しました', 'd')
    }
  } finally {
    isTyping = false
    document.getElementById('send-btn').disabled = false
  }
}

function sleep(ms) { return new Promise(r=>setTimeout(r,ms)) }

function detectRedirect(text) {
  const t = text.toLowerCase()
  if(/旅行|ホテル|観光|旅|trip|travel/.test(t)) return 'travel'
  if(/料理|レシピ|食材|献立|cook|recipe/.test(t)) return 'cooking'
  if(/買い物|購入|商品|shop|buy|price/.test(t)) return 'shopping'
  if(/diy|修繕|工作|棚|作る/.test(t)) return 'diy'
  if(/家電|テレビ|冷蔵庫|インテリア|部屋/.test(t)) return 'home'
  if(/健康|運動|食事|睡眠|ダイエット|体/.test(t)) return 'health'
  return null
}

function requestUserLocation() {
  if (window._locationRequested) return
  window._locationRequested = true
  if (!navigator.geolocation) return
  navigator.geolocation.getCurrentPosition(
    pos => {
      window._userLat = pos.coords.latitude
      window._userLng = pos.coords.longitude
      console.log('[Gourmet] 位置情報取得:', window._userLat, window._userLng)
      // 位置情報取得済みをチャットに通知
      const notice = document.createElement('div')
      notice.style.cssText = 'text-align:center;font-size:11px;color:var(--subtle);margin:6px 0'
      notice.textContent = '📍 現在地を取得しました'
      document.getElementById('chat-msgs').appendChild(notice)
    },
    err => {
      console.warn('[Gourmet] 位置情報取得失敗:', err.message)
    },
    { enableHighAccuracy: false, timeout: 8000 }
  )
}

          <div class="rest-addr">📍 ${p.address || '住所情報なし'}</div>
        </div>
        <button class="rest-fav" onclick="event.stopPropagation();saveRestAsFavorite(this,'${p.name}','${p.address||''}','${p.maps_url}',${p.rating||0})" title="お気に入りに追加">♡</button>
        <div class="rest-arrow">›</div>
      </div>
    `).join('')}
  `
  document.getElementById('chat-msgs').appendChild(wrap)
  scrollBottom()
}

// ─── グルメAI: chat.htmlのextra処理でお店を描画 ─────────────
function handleGourmetExtra(extra) {
  if (extra && extra._places && extra._places.places) {
    renderRestaurantCards(extra._places.places)
  }
}

// ─── 商品カード描画（買い物AI・家電AI）───────────────────────
let _lastProducts = []  // 比較表用に保持

function renderProductCards(items, userLat, userLng) {
  if (!items || !items.length) return
  _lastProducts = items
  const wrap = document.createElement('div')
  wrap.className = 'product-cards'

  const minPrice = Math.min(...items.map(p=>p.price||Infinity))

  wrap.innerHTML = `
    <div style="font-size:12px;color:var(--subtle);margin-bottom:8px;font-weight:600;display:flex;align-items:center;justify-content:space-between">
      <span>🛍️ 楽天市場の商品 ${items.length}件</span>
      <button onclick="showCompareTable()" style="font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit">比較表を見る →</button>
    </div>
    ${items.map((p, i) => {
      const isBest = p.price === minPrice
      const safeName = (p.name||'').replace(/'/g,"'").replace(/"/g,'&quot;').slice(0,80)
      const safeShop = (p.shop||'').replace(/'/g,"'")
      const safeUrl  = p.url||''
      const safeImg  = p.image||''
      return `
      <div class="product-card${isBest?' best-price':''}" onclick="showProductDetail(${i})">
        <div class="product-card-inner">
          <div class="product-img-wrap">
            ${safeImg
              ? `<img class="product-img" src="${safeImg}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=product-img-placeholder>🛍️</div>'">`
              : `<div class="product-img-placeholder">🛍️</div>`}
          </div>
          <div class="product-body">
            <div class="product-rank">${i+1}</div>
            <div class="product-name">${safeName}</div>
            ${p.catchcopy ? `<div class="product-catch">${p.catchcopy}</div>` : ''}
            <div class="product-meta">
              <span class="product-price">¥${(p.price||0).toLocaleString()}</span>
              ${isBest ? '<span class="product-point">最安値</span>' : ''}
              ${p.review ? `<span class="product-review">⭐ ${p.review}(${p.review_count||0}件)</span>` : ''}
              ${p.shop ? `<span class="product-shop">${safeShop}</span>` : ''}
            </div>
          </div>
        </div>
        <button class="product-fav" title="お気に入りに追加"
          onclick="event.stopPropagation();saveProdAsFavorite(this,'${safeName}','${safeUrl}',${p.price||0},'${safeShop}')">♡</button>
      </div>`
    }).join('')}
  `
  document.getElementById('chat-msgs').appendChild(wrap)
  scrollBottom()
}

function showProductDetail(idx) {
  const p = _lastProducts[idx]
  if(!p) return
  showModal({
    title: '商品詳細',
    body: `
      ${p.image ? `<img class="prod-detail-img" src="${p.image}" alt="">` : ''}
      <div style="font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.5;margin-bottom:8px">${p.name||''}</div>
      <div class="prod-detail-price">¥${(p.price||0).toLocaleString()}</div>
      <div class="prod-detail-meta">
        ${p.shop ? `<span class="prod-detail-tag">🏪 ${p.shop}</span>` : ''}
        ${p.review ? `<span class="prod-detail-tag">⭐ ${p.review}（${p.review_count||0}件のレビュー）</span>` : ''}
        ${p.point ? `<span class="prod-detail-tag" style="color:#dc2626">🎁 ${p.point}倍ポイント</span>` : ''}
      </div>
      ${p.catchcopy ? `<div style="font-size:12px;color:var(--muted);margin-bottom:14px">${p.catchcopy}</div>` : ''}
    `,
    actions:[
      {label:'閉じる', cls:'btn-g', fn:'closeModal()'},
      {label:'楽天で購入する 🛒', cls:'btn-gold', fn:`window.open('${p.url}','_blank');closeModal()`},
    ]
  })
}

function showCompareTable() {
  if(!_lastProducts.length) return
  const items = _lastProducts.slice(0,6)
  const minPrice = Math.min(...items.map(p=>p.price||Infinity))
  const maxReview = Math.max(...items.map(p=>p.review||0))

  const rows = items.map((p,i) => {
    const priceBest  = p.price  === minPrice  ? ' class="best"' : ''
    const reviewBest = p.review === maxReview && maxReview > 0 ? ' class="best"' : ''
    return `<tr${i===0?' class="rank1"':''}>
      <td style="font-weight:600">${i+1}. ${(p.name||'').slice(0,30)}${p.name&&p.name.length>30?'…':''}</td>
      <td${priceBest}>¥${(p.price||0).toLocaleString()}${priceBest?' 👑':''}</td>
      <td${reviewBest}>${p.review ? `⭐${p.review}(${p.review_count}件)${reviewBest?' 👑':''}` : 'なし'}</td>
      <td>${p.shop||'-'}</td>
      <td><a href="${p.url}" target="_blank" style="color:var(--accent);font-size:11px">見る→</a></td>
    </tr>`
  }).join('')

  showModal({
    title: '🛍️ 商品比較表',
    body: `
      <div class="compare-wrap">
        <table class="compare-table">
          <thead><tr>
            <th>商品名</th><th>価格</th><th>評価</th><th>ショップ</th><th>リンク</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div style="font-size:11px;color:var(--subtle);margin-top:10px">👑 = 最優秀・最安値</div>
    `,
    actions:[{label:'閉じる',cls:'btn-g',fn:'closeModal()'}]
  })
}

// ─── ホテルカード描画（旅行AI）──────────────────────────────
function renderHotelCards(hotels) {
  if (!hotels || !hotels.length) return
  const wrap = document.createElement('div')
  wrap.className = 'hotel-cards'
  wrap.innerHTML = `
    <div style="font-size:12px;color:var(--subtle);margin-bottom:6px;font-weight:600">🏨 楽天トラベルのホテル</div>
    ${hotels.map(h => `
      <div class="hotel-card" onclick="window.open('${h.url}','_blank')">
        <div class="hotel-name">${h.name}</div>
        <div class="hotel-meta">
          ${h.review ? `<span>⭐ ${h.review}（${h.review_count}件）</span>` : ''}
          ${h.area   ? `<span>📍 ${h.area}</span>` : ''}
        </div>
        ${h.price ? `<div class="hotel-price">¥${Number(h.price).toLocaleString()}〜 / 泊</div>` : ''}
        ${h.access ? `<div class="hotel-access">🚉 ${h.access}</div>` : ''}
        <button class="hotel-fav" title="お気に入りに追加"
          onclick="event.stopPropagation();saveHotelAsFavorite(this,'${(h.name||'').replace(/'/g,'&apos;')}','${h.url}',${h.price||0},'${(h.area||'').replace(/'/g,'&apos;')}')">♡</button>
      </div>
    `).join('')}
  `
  document.getElementById('chat-msgs').appendChild(wrap)
  scrollBottom()
}

</script>
<div id="mobile-nav-root"></div>
</body>
</html>
