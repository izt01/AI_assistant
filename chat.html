<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<title>チャット — Lumina AI</title>
<style>
/* ===== 既存スタイル（変更なし） ===== */
.chat-shell{display:flex;flex-direction:column;height:calc(100vh - var(--hh));overflow:hidden}
.chat-topbar{padding:12px 18px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:11px;flex-shrink:0}
.chat-ai-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.chat-ai-name{font-family:'Fraunces',serif;font-size:16px;font-weight:900;color:var(--ink);letter-spacing:-.02em}
.chat-ai-desc{font-size:11px;color:var(--muted)}
.chat-msgs{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:20px;display:flex;flex-direction:column;gap:12px;background:var(--cream)}
.chat-input-area{padding:14px 18px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.chat-input-row{display:flex;gap:9px;align-items:flex-end}
.chat-input-row textarea{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13px;font-family:inherit;resize:none;min-height:44px;max-height:120px;background:var(--cream);transition:all .15s;outline:none;line-height:1.5}
.chat-input-row textarea:focus{border-color:var(--gold2);box-shadow:0 0 0 3px rgba(201,168,76,.1);background:var(--surface)}
.send-btn{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;transition:all .16s;border:none;font-weight:700}
.send-btn:hover{box-shadow:0 4px 14px rgba(201,168,76,.3);transform:scale(1.06)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.msg-row{display:flex;align-items:flex-start;gap:9px}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.msg-bubble{max-width:82%;padding:11px 14px;border-radius:16px;font-size:13px;line-height:1.65}
.msg-row.ai .msg-bubble{background:var(--surface);border:1px solid var(--border);color:var(--ink3);border-radius:4px 16px 16px 16px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.msg-row.user .msg-bubble{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border-radius:16px 4px 16px 16px;font-weight:500}
.msg-time{font-size:10px;color:var(--subtle);margin-top:4px;text-align:right}
.typing-indicator{display:flex;gap:5px;align-items:center;padding:11px 14px}
.ty-dot{width:8px;height:8px;border-radius:50%;background:var(--subtle);animation:ty 1.2s ease infinite}
.ty-dot:nth-child(2){animation-delay:.2s}
.ty-dot:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:99px;padding:5px 12px;font-size:11.5px;color:var(--gold);cursor:pointer;transition:all .15s}
.chip:hover{background:rgba(201,168,76,.15)}
.redirect-card{background:var(--cream2);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-top:10px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .18s}
.redirect-card:hover{border-color:var(--gold2);background:rgba(201,168,76,.04)}
.usage-badge{background:var(--cream2);border:1px solid var(--border);border-radius:99px;padding:4px 11px;font-size:11px;color:var(--muted);white-space:nowrap}
.usage-badge.warn{background:var(--warningbg);border-color:rgba(217,119,6,.25);color:#92400e}
.usage-badge.dngr{background:var(--dangerbg);border-color:rgba(220,38,38,.25);color:#991b1b}
.fb-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;align-items:center}
.fb-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .14s;font-family:inherit}
.fb-btn:hover{background:var(--cream2)}
.fb-btn.active{background:var(--successbg);border-color:rgba(5,150,105,.2);color:var(--success)}
.fb-btn.reaction-love.active{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:#dc2626}
.fb-btn.reaction-helpful.active{background:var(--successbg);border-color:rgba(5,150,105,.2);color:var(--success)}
.fb-btn.reaction-neg.active{background:var(--warningbg);border-color:rgba(217,119,6,.25);color:#92400e}
.fb-done-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border:none;border-radius:8px;padding:4px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .14s}
.fb-done-btn:hover{opacity:.88}
.fb-sep{width:1px;height:16px;background:var(--border);margin:0 2px}
.fav-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .14s;font-family:inherit}
.fav-btn:hover{background:rgba(220,38,38,.05);border-color:rgba(220,38,38,.3);color:#dc2626}
.fav-btn.saved{background:rgba(220,38,38,.07);border-color:rgba(220,38,38,.3);color:#dc2626}
.rest-card{position:relative}
.rest-fav{position:absolute;top:8px;right:30px;background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;transition:all .14s;color:var(--muted)}
.rest-fav:hover,.rest-fav.saved{color:#dc2626;border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.06)}
.product-cards{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .18s;position:relative}
.product-card:hover{border-color:var(--gold2);box-shadow:0 4px 20px rgba(201,168,76,.12);transform:translateY(-1px)}
.product-card-inner{display:flex;gap:0;align-items:stretch}
.product-img-wrap{width:90px;flex-shrink:0;background:var(--cream2);overflow:hidden}
.product-img{width:90px;height:90px;object-fit:cover}
.product-img-placeholder{width:90px;height:90px;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--cream2)}
.product-body{flex:1;min-width:0;padding:11px 38px 11px 12px}
.product-rank{position:absolute;top:8px;left:8px;width:20px;height:20px;background:var(--ink);color:#fff;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.product-name{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:5px}
.product-catch{font-size:10.5px;color:var(--muted);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.product-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.product-price{font-family:'Fraunces',serif;font-size:16px;font-weight:900;color:var(--gold)}
.product-shop{font-size:10.5px;color:var(--subtle);padding:2px 6px;background:var(--cream2);border-radius:4px}
.product-review{font-size:10.5px;color:var(--muted)}
.product-point{font-size:10px;color:#dc2626;font-weight:600}
.product-fav{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .14s;color:var(--muted)}
.product-fav:hover,.product-fav.saved{color:#dc2626;border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.06)}
.prod-detail-img{width:100%;max-height:200px;object-fit:contain;border-radius:8px;background:var(--cream2);margin-bottom:14px}
.prod-detail-price{font-family:'Fraunces',serif;font-size:24px;font-weight:900;color:var(--gold);margin-bottom:8px}
.prod-detail-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.prod-detail-tag{font-size:11.5px;padding:3px 9px;border-radius:6px;background:var(--cream2);color:var(--muted)}
.compare-wrap{margin-top:12px;overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
.compare-table{width:100%;border-collapse:collapse;font-size:12px}
.compare-table th{background:var(--ink);color:#fff;padding:8px 10px;text-align:left;font-weight:600;white-space:nowrap}
.compare-table td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.compare-table tr:last-child td{border-bottom:none}
.compare-table tr:hover td{background:var(--cream2)}
.compare-table .best{color:var(--success);font-weight:700}
.compare-table .rank1{background:rgba(201,168,76,.06)}
.product-badge-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.product-badge{font-size:9.5px;padding:2px 7px;border-radius:99px;font-weight:600;white-space:nowrap}
.badge-cheap{background:rgba(220,38,38,.1);color:#dc2626}
.badge-popular{background:rgba(201,168,76,.12);color:#a07c20}
.badge-new{background:rgba(59,130,246,.1);color:#2563eb}
.badge-point{background:rgba(16,185,129,.1);color:#059669}
.prod-detail-section{margin-bottom:14px}
.prod-detail-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.prod-feature-list{display:flex;flex-direction:column;gap:4px}
.prod-feature-item{font-size:12px;color:var(--ink3);display:flex;gap:6px;align-items:flex-start}
.hotel-cards{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.hotel-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;transition:all .15s;position:relative}
.hotel-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.hotel-name{font-family:'Fraunces',serif;font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:5px}
.hotel-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--muted);margin-bottom:6px}
.hotel-price{font-family:'Fraunces',serif;font-size:14px;font-weight:700;color:var(--gold)}
.hotel-access{font-size:11px;color:var(--subtle);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hotel-fav{position:absolute;top:10px;right:10px;background:transparent;border:none;font-size:15px;cursor:pointer;color:var(--muted);transition:all .14s;padding:2px}
.hotel-fav:hover,.hotel-fav.saved{color:#dc2626}

/* ===== ★ 追加: 近隣店舗カード（買い物AI・料理AI 共通）===== */
.nearby-stores{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.nearby-store-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .16s;text-decoration:none}
.nearby-store-card:hover{border-color:var(--gold2);background:rgba(201,168,76,.03);transform:translateY(-1px);box-shadow:0 3px 12px rgba(201,168,76,.1)}
.store-rank{width:24px;height:24px;border-radius:50%;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.store-body{flex:1;min-width:0}
.store-name{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.store-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:2px}
.store-rating{font-size:11px;color:var(--gold);font-weight:600}
.store-open{font-size:10px;background:rgba(22,163,74,.1);color:#16a34a;padding:1px 7px;border-radius:20px;font-weight:600}
.store-closed{font-size:10px;background:rgba(220,38,38,.08);color:#dc2626;padding:1px 7px;border-radius:20px}
.store-addr{font-size:11px;color:var(--subtle);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.store-arrow{font-size:18px;color:var(--subtle);flex-shrink:0}
</style>
</head>

<script>
 
const _aiParam = new URLSearchParams(location.search).get('ai') || 'all';
const _aiNames = {all:'総合AI',travel:'旅行AI',cooking:'料理AI',shopping:'買い物AI',diy:'DIY AI',home:'家電AI',health:'健康AI'};

<script>
// ─── 初期化（非同期）────────────────────────────────────────
let user = null
const aiParam = new URLSearchParams(location.search).get('ai') || 'all'
 
const AI_CONFIG = {
  all:      {icon:'✦',  name:'総合チャット AI',   desc:'なんでもお任せください。最適なAIへご案内します',  color:'#c9a84c', bg:'rgba(201,168,76,.12)',
    greetings:['こんにちは！何でもお気軽にご相談ください。グルメ・旅行・料理・買い物・DIY・家電・健康など、あなたのご要望に合わせて最適なAIをご案内します✨','今日はどんなことでお手伝いできますか？お気軽にどうぞ！']},
  gourmet:  {icon:'🍽️', name:'グルメ AI',        desc:'食べたいものからお店を探す・飲食店提案',         color:'#f97316', bg:'rgba(249,115,22,.12)',
    greetings:['何を食べたいですか？🍽️\nお腹のすき加減やジャンル、雰囲気を教えていただければ近くのおすすめのお店をご紹介します！','今日のランチ・ディナーはどこに行きますか？気分を教えてくれれば、ぴったりのお店を探します😊']},
  travel:   {icon:'✈️', name:'旅行 AI',           desc:'旅程作成・ホテル提案・観光スポット案内',          color:'#6495ed', bg:'rgba(100,149,237,.12)',
    greetings:['旅行の計画をお手伝いします！✈️\n行き先、旅行期間、ご予算などを教えていただければ、最適なプランを提案します。','どんな旅行をご計画ですか？国内・海外、どちらもお任せください！']},
  cooking:  {icon:'🍳', name:'料理 AI',           desc:'レシピ提案・献立作成・買い物リスト生成',          color:'#ffa500', bg:'rgba(255,165,0,.12)',
    greetings:['料理のお手伝いをします！🍳\n「冷蔵庫にある食材」や「食べたいもの」を教えていただければ、レシピをご提案します。','今日は何を作りますか？食材を教えていただければ、美味しいレシピをご提案します！']},
  shopping: {icon:'🛍️',name:'買い物 AI',         desc:'商品比較・価格調査・おすすめ商品提案',            color:'#32cd32', bg:'rgba(50,205,50,.12)',
    greetings:['買い物のお手伝いをします！🛍️\n探している商品や予算を教えていただければ、最適な選択肢をご提案します。','何をお探しですか？予算と用途を教えていただければ、コスパの良い商品をご紹介します！']},
  diy:      {icon:'🔨', name:'DIY AI',            desc:'修繕方法・作業手順・必要材料リスト',              color:'#ff6347', bg:'rgba(255,99,71,.12)',
    greetings:['DIY・修繕のお手伝いをします！🔨\n何を作りたい・直したいか教えていただければ、手順と必要な道具をご説明します。','どんなDIYプロジェクトですか？初心者の方でも安心してお任せください！']},

const ai = AI_CONFIG[aiParam] || AI_CONFIG.all
let messages = []
let isTyping = false
let fbPending = null
let currentSessionId = null
let lastMessageId  = null
let lastProposalId = null
let lastReactionDone = false
 
// 楽天AppIDをバックエンドから取得
let _rakutenAppId = ''
async function loadConfig() {
  try {
    const d = await fetch('/api/config').then(r=>r.json())
    _rakutenAppId = d.rakuten_app_id || ''
    console.log('[Config] rakutenAppId取得:', _rakutenAppId ? '✓' : '未設定')
  } catch(e) { console.warn('[Config] 取得失敗', e) }
}
 
loadConfig()
requireAuth().then(u => { if(u){ user=u; init() } })
 
// ─── 楽天市場 ブラウザ直接検索（買い物AI・家電AI）─────────
async function searchRakutenDirect(keyword, maxResults=6, minPrice=null, maxPrice=null) {
  if(!_rakutenAppId) { console.warn('[Rakuten] AppID未設定'); return null }
  try {
    const params = new URLSearchParams({
      applicationId: _rakutenAppId,
      keyword,
      hits:          maxResults,
      sort:          'standard',
      availability:  1,
      imageFlag:     1,
      formatVersion: 2,
    })
    if(minPrice) params.append('minPrice', minPrice)
    if(maxPrice) params.append('maxPrice', maxPrice)
    const r = await fetch('https://app.rakuten.co.jp/services/api/IchibaItem/Search/20170706?' + params)
    const data = await r.json()
    console.log('[Rakuten] keyword=' + keyword + ' items=' + (data.Items||[]).length)
    if(data.error) { console.warn('[Rakuten] error:', data.error); return null }
    return (data.Items || []).map(item => ({
      name:         (item.itemName||'').slice(0,80),
      price:        item.itemPrice,
      shop:         item.shopName,
      url:          item.itemUrl,
      image:        (item.mediumImageUrls||[])[0] || '',
      review:       item.reviewAverage,
      review_count: item.reviewCount,
      catchcopy:    (item.catchcopy||'').slice(0,60),
      point:        item.pointRate,
    }))
  } catch(e) { console.error('[Rakuten] エラー:', e); return null }
}

  buildSidebar('chat-'+aiParam)

  document.getElementById('chat-topbar').innerHTML = `
    <div class="chat-ai-icon" style="background:${ai.bg}">${ai.icon}</div>

function updateUsageBadge() {
  const u = getUser() || {}
  const limit = u.usage_limit || PLANS[u.plan]?.limit || 10
  const used  = u.usage_count || 0
  const remaining = Math.max(0, limit - used)
  const pct = Math.min(100, Math.round(used / limit * 100))
  const badge = document.getElementById('usage-badge')
  if(!badge) return
  badge.className = 'usage-badge' + (pct>=90?' dngr':pct>=70?' warn':'')
  badge.textContent = `残り${remaining}回`

// ─── メッセージ送信 ───────────────────────────────────────────
async function sendMsg() {
  const input = document.getElementById('chat-input')
  const text = input.value.trim()
  if(!text || isTyping) return
 
  const limit = PLANS[user?.plan]?.limit || 10
  if((user?.usage_count||0) >= limit) {
    if(user?.plan==='master') showLimitReachedModal()
    else showUpgradeModal(user?.plan)
    return
  }
 
  input.value = ''
  input.style.height = 'auto'
  document.getElementById('send-btn').disabled = true
  isTyping = true
  document.querySelectorAll('.chip-row').forEach(e=>e.remove())
 
  messages.push({ role:'user', content:text })
  addMessage('user', text)
  scrollBottom(true)
  showTyping()
 
  try {
    const resp = await apiRequest('/chat', {
      method: 'POST',
      body: {
        ai_type:    aiParam,
        messages:   messages,
        session_id: currentSessionId,
        lat:        window._userLat || null,
        lng:        window._userLng || null,
      }
    })
 
    hideTyping()
    currentSessionId = resp.session_id
    lastMessageId    = resp.message_id
    lastProposalId   = resp.proposal_id || null
    lastReactionDone = false
 
    // replyがJSON全体になってしまった場合の安全策
    // （base.pyが古い版の場合など、サーバーがJSON全体をreplyとして返すケースに対応）
    let reply = resp.reply || ''
    // extra.plans（base.pyが直接渡す）→ _travel_plans → replyのJSON の優先順で取得
    let extraPlans = (resp.extra && resp.extra.plans)
                  || (resp.extra && resp.extra._travel_plans)
                  || null
 
    if(!extraPlans && reply.trimStart().startsWith('{') && reply.includes('"plans"')) {
      try {
        const parsed = JSON.parse(reply)
        if(parsed.message) reply = parsed.message
        if(parsed.plans) extraPlans = parsed.plans
        console.log('[Travel] replyからplansを抽出:', extraPlans?.length, '案')
      } catch(e) { /* パース失敗 → そのまま表示 */ }
    }
 
    messages.push({ role:'assistant', content:reply })
    addMessage('ai', reply)
 
    if(resp.learning_applied > 0) {
      toast(`✦ AIがあなたの好みを${resp.learning_applied}件学習しました`, '')
    }
 
    if(user) { user.usage_count = resp.usage_count || (user.usage_count||0)+1; setCachedUser(user) }
 
    // ── extra 内の API 結果をAI種別ごとに描画 ──────────────
 
    // グルメAI: Google Maps 飲食店
    if(aiParam === 'gourmet' && resp.extra && resp.extra._places) {
      handleGourmetExtra(resp.extra)
    }
 
    // 旅行AI: 旅行プランカード（extra._travel_plans または reply から抽出したplans）
    if(aiParam === 'travel' && extraPlans && extraPlans.length > 0) {
      renderTravelPlans(extraPlans)
    }
 
    // 旅行AI: 国内ホテルカード（楽天）
    if(resp.extra && resp.extra._hotels && resp.extra._hotels.hotels && resp.extra._hotels.hotels.length > 0) {
      renderHotelCards(
        resp.extra._hotels.hotels,
        resp.extra._hotels.source || 'rakuten'
      )
    }
 
    // 料理AI: Google Maps 近隣スーパー ★新規追加
    if(aiParam === 'cooking' && resp.extra && resp.extra._nearby_stores) {
      renderNearbyStores(resp.extra._nearby_stores.places || [], 'cooking')
    }
 
    // ── 商品カード描画 ──────────────────────────────────────────
    // 家電AI(home/appliance): バックエンドが検索済みの _products を優先使用
    if(aiParam === 'home' && resp.extra && resp.extra._products) {
      renderProductCards(resp.extra._products.items || [], 'appliance')
 
    // 買い物AI(shopping): ブラウザから楽天を直接検索（リアルタイム検索）
    } else if(aiParam === 'shopping' && _rakutenAppId) {
      const kwFromAI = resp.extra && resp.extra._search_keyword
      const kw = kwFromAI || (resp.extra?.needs_more_info ? null : extractShoppingKeyword(text, reply))
      console.log('[Shopping] needs_more_info=', resp.extra?.needs_more_info, 'kw=', kw)
      if(kw) {
        const loadingEl = document.createElement('div')
        loadingEl.id = 'product-loading'
        loadingEl.style.cssText = 'text-align:center;padding:16px;color:var(--subtle);font-size:12px'
        loadingEl.textContent = '🛍️ 楽天市場を検索中...'
        document.getElementById('chat-msgs').appendChild(loadingEl)
        scrollBottom()
        ;(async () => {
          const items = await searchRakutenDirect(kw, 6)
          const el = document.getElementById('product-loading')
          if(el) el.remove()
          if(items && items.length > 0) {
            renderProductCards(items, 'shopping')
            if(resp.extra && resp.extra._nearby_stores) {
              renderNearbyStores(resp.extra._nearby_stores.places || [], 'shopping')
            }
          } else {
            console.warn('[Shopping] 商品0件 kw='+kw)
          }
        })()
      }
 
    // DIY AI(diy): バックエンドの _products を使用
    } else if(aiParam === 'diy' && resp.extra && resp.extra._products) {
      renderProductCards(resp.extra._products.items || [], 'diy')
 
    // その他AIでバックエンドが _products を返した場合
    } else if(resp.extra && resp.extra._products) {
      renderProductCards(resp.extra._products.items || [])
    }
 
    addActionChips(aiParam, text)
    updateUsageBadge()
 
  } catch(e) {
    hideTyping()
    if(e.error === 'usage_limit_reached') {
      if(user?.plan==='master') showLimitReachedModal()
      else showUpgradeModal(user?.plan)
    } else {
      addMessage('ai', '申し訳ありません。エラーが発生しました。しばらくしてから再度お試しください。')
      toast('エラーが発生しました', 'd')
    }
  } finally {
    isTyping = false
    document.getElementById('send-btn').disabled = false
  }
}
 
// ショッピング検索キーワード抽出（既存）
function extractShoppingKeyword(userText, aiReply) {
  const cleaned = userText
    .replace(/を?(買い?替え|探し|見つけ|教え)?(たい|て|ほしい|ください)/g, '')
    .replace(/(おすすめ|比較|安い|高い|コスパ|良い|いい)(の|な|に)?/g, '')
    .replace(/[。、！？!?\n]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
  if(cleaned.length >= 2) return cleaned
  const match = aiReply.match(/「([^」]{2,20})」/)
  return match ? match[1] : null
}

function requestUserLocation(aiType) {
  if(window._locationRequested) return
  window._locationRequested = true
  if(!navigator.geolocation) return
  navigator.geolocation.getCurrentPosition(
    pos => {
      window._userLat = pos.coords.latitude
      window._userLng = pos.coords.longitude
      console.log(`[${aiType}] 位置情報取得:`, window._userLat, window._userLng)
      const notice = document.createElement('div')
      notice.style.cssText = 'text-align:center;font-size:11px;color:var(--subtle);margin:6px 0'
      notice.textContent = '📍 現在地を取得しました'
      document.getElementById('chat-msgs').appendChild(notice)
    },
    err => { console.warn(`[${aiType}] 位置情報取得失敗:`, err.message) },
    { enableHighAccuracy: false, timeout: 8000 }
  )
}

function getProductBadges(p, isBest) {
  const badges = []
  if(isBest) badges.push('<span class="product-badge badge-cheap">💰 最安値</span>')
  if(p.review >= 4.5 && p.review_count >= 50) badges.push('<span class="product-badge badge-popular">⭐ 人気</span>')
  if(p.point >= 5) badges.push(`<span class="product-badge badge-point">🎁 ${p.point}倍P</span>`)
  const cc = p.catchcopy || ''
  if(/軽量|軽い/.test(cc))  badges.push('<span class="product-badge badge-new">🪶 軽量</span>')
  if(/IH|ih/.test(cc+p.name)) badges.push('<span class="product-badge badge-new">🔥 IH対応</span>')
  if(/長持|耐久|丈夫/.test(cc)) badges.push('<span class="product-badge badge-popular">💪 長持ち</span>')
  if(/送料無料/.test(cc)) badges.push('<span class="product-badge badge-point">🚚 送料無料</span>')
  return badges.slice(0,3).join('')
}

function showCompareTable() {
  if(!_lastProducts.length) return
  const items     = _lastProducts.slice(0, 6)
  const minPrice  = Math.min(...items.map(p => p.price  || Infinity))
  const maxReview = Math.max(...items.map(p => p.review || 0))
  const maxPoint  = Math.max(...items.map(p => p.point  || 0))
 
  // 各商品のスコアを算出（価格・評価・ポイントの総合評価）
  function calcScore(p) {
    let s = 0
    if(p.price  === minPrice)                      s += 3
    else if(p.price <= minPrice * 1.1)             s += 2
    else if(p.price <= minPrice * 1.2)             s += 1
    if(p.review >= 4.5)                            s += 3
    else if(p.review >= 4.0)                       s += 2
    else if(p.review >= 3.5)                       s += 1
    if(p.point  >= 5)                              s += 2
    else if(p.point >= 3)                          s += 1
    if(/送料無料/.test(p.catchcopy||''))           s += 1
    if(/日本製|国産/.test((p.name||'')+(p.catchcopy||''))) s += 1
    return s
  }
  const scores    = items.map(calcScore)
  const maxScore  = Math.max(...scores)
 
  // バッジ生成
  function badges(p, score, idx) {
    const bs = []
    if(p.price  === minPrice)  bs.push('<span style="background:rgba(220,38,38,.12);color:#dc2626;font-size:9.5px;padding:2px 7px;border-radius:20px;font-weight:700;white-space:nowrap">💰 最安値</span>')
    if(p.review === maxReview && maxReview > 0) bs.push('<span style="background:rgba(201,168,76,.12);color:#a07c20;font-size:9.5px;padding:2px 7px;border-radius:20px;font-weight:700;white-space:nowrap">⭐ 最高評価</span>')
    if(score    === maxScore)  bs.push('<span style="background:rgba(16,185,129,.1);color:#059669;font-size:9.5px;padding:2px 7px;border-radius:20px;font-weight:700;white-space:nowrap">✦ 総合おすすめ</span>')
    if(/送料無料/.test(p.catchcopy||'')) bs.push('<span style="background:rgba(59,130,246,.1);color:#2563eb;font-size:9.5px;padding:2px 7px;border-radius:20px;font-weight:700;white-space:nowrap">🚚 送料無料</span>')
    return bs.join('')
  }
 
  // スコアバー描画（5段階）
  function scoreBar(score) {
    const max = 10
    const pct = Math.round(score / max * 100)
    const color = pct >= 70 ? '#059669' : pct >= 40 ? '#c9a84c' : '#94a3b8'
    return `<div style="display:flex;align-items:center;gap:6px">
      <div style="flex:1;height:6px;background:var(--cream2);border-radius:3px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${color};border-radius:3px;transition:width .4s"></div>
      </div>
      <span style="font-size:10px;color:var(--muted);min-width:20px">${score}</span>
    </div>`
  }
 
  // カード型比較表
  const cards = items.map((p, i) => {
    const score   = scores[i]
    const isTop   = score === maxScore
    const border  = isTop ? 'border:1.5px solid rgba(201,168,76,.5)' : 'border:1px solid var(--border)'
    const bg      = isTop ? 'background:rgba(201,168,76,.04)' : 'background:var(--surface)'
    const nameTxt = (p.name||'').slice(0, 40) + ((p.name||'').length > 40 ? '…' : '')
    const shopUrl = p.shop ? `https://www.google.com/maps/search/${encodeURIComponent(p.shop)}` : ''
    return `
    <div style="${border};${bg};border-radius:10px;padding:12px;position:relative">
      ${isTop ? '<div style="position:absolute;top:-1px;left:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:0 0 6px 6px">✦ おすすめ</div>' : ''}
      <div style="display:flex;gap:10px;align-items:flex-start;margin-top:${isTop?'8px':'0'}">
        <!-- 画像 -->
        ${p.image
          ? `<img src="${p.image}" style="width:56px;height:56px;object-fit:cover;border-radius:6px;flex-shrink:0">`
          : `<div style="width:56px;height:56px;border-radius:6px;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">🛍️</div>`}
        <!-- 情報 -->
        <div style="flex:1;min-width:0">
          <div style="font-size:11.5px;font-weight:700;color:var(--ink);line-height:1.4;margin-bottom:4px">${i+1}. ${nameTxt}</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">${badges(p, score, i)}</div>
          <!-- 価格・評価・ポイント -->
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px">
            <div style="background:var(--cream2);border-radius:6px;padding:5px 8px;text-align:center">
              <div style="font-size:9px;color:var(--muted);margin-bottom:1px">価格</div>
              <div style="font-family:'Fraunces',serif;font-size:14px;font-weight:900;color:${p.price===minPrice?'#dc2626':'var(--gold)'}">¥${(p.price||0).toLocaleString()}</div>
            </div>
            <div style="background:var(--cream2);border-radius:6px;padding:5px 8px;text-align:center">
              <div style="font-size:9px;color:var(--muted);margin-bottom:1px">評価</div>
              <div style="font-size:13px;font-weight:700;color:var(--ink3)">${p.review ? `⭐${p.review}` : '—'}</div>
              ${p.review_count ? `<div style="font-size:9px;color:var(--muted)">${p.review_count}件</div>` : ''}
            </div>
            <div style="background:var(--cream2);border-radius:6px;padding:5px 8px;text-align:center">
              <div style="font-size:9px;color:var(--muted);margin-bottom:1px">ポイント</div>
              <div style="font-size:13px;font-weight:700;color:${p.point>=5?'#059669':'var(--ink3)'}">${p.point ? `${p.point}倍` : '—'}</div>
            </div>
          </div>
          <!-- 総合スコアバー -->
          <div style="margin-bottom:6px">
            <div style="font-size:9px;color:var(--muted);margin-bottom:3px">総合スコア</div>
            ${scoreBar(score)}
          </div>
          <!-- 店舗 -->
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span style="font-size:10.5px;color:var(--subtle)">🏪 ${p.shop||'楽天市場'}</span>
            ${shopUrl ? `<a href="${shopUrl}" target="_blank" style="font-size:10px;color:#4285f4;text-decoration:none;border:1px solid rgba(66,133,244,.25);border-radius:4px;padding:1px 6px">📍 地図</a>` : ''}
          </div>
        </div>
      </div>
      <!-- 購入ボタン -->
      <div style="margin-top:10px;display:flex;gap:7px">
        <button onclick="closeModal();setTimeout(()=>showPurchaseConfirm(${i}),120)"
          style="flex:1;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border:none;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">
          🛒 購入確認へ
        </button>
        <a href="${p.url}" target="_blank"
          style="display:flex;align-items:center;justify-content:center;background:var(--cream2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--ink3);text-decoration:none;white-space:nowrap">
          詳細 →
        </a>
      </div>
    </div>`
  }).join('')
 
  showModal({
    title: '🛍️ 商品比較',
    wide: true,
    body: `
      <div style="font-size:11.5px;color:var(--muted);margin-bottom:10px">
        ${items.length}件を比較中 · ✦おすすめはAIの総合スコアで自動選定
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${cards}
      </div>
      <div style="margin-top:12px;padding:8px 12px;background:var(--cream2);border-radius:8px;font-size:10.5px;color:var(--muted);line-height:1.6">
        ✦おすすめ = 価格・評価・ポイント・送料・品質を総合評価したスコアで自動判定
      </div>
    `,
    actions: [{label:'閉じる', cls:'btn-g', fn:'closeModal()'}]
  })
}
 
// ─── 旅行プランカード描画 ────────────────────────────────────────
let _lastTravelPlans = []
 
function travelActivityIcon(activity) {
  const a = activity || ''
  if (/新幹線|電車|鉄道|JR|jr|列車/.test(a)) return '🚄'
  if (/バス|bus/.test(a)) return '🚌'
  if (/飛行機|空港|フライト|航空/.test(a)) return '✈️'
  if (/タクシー|cab/.test(a)) return '🚕'
  if (/船|フェリー|クルーズ/.test(a)) return '🚢'
  if (/自転車|レンタサイクル/.test(a)) return '🚴'
  if (/車|ドライブ|レンタカー/.test(a)) return '🚗'
  if (/朝食|モーニング|朝ごはん/.test(a)) return '🍳'
  if (/昼食|ランチ|昼ごはん/.test(a)) return '🍱'
  if (/夕食|ディナー|夜ごはん|夜食/.test(a)) return '🍽️'
  if (/温泉|大浴場|お風呂/.test(a)) return '♨️'
  if (/チェックイン|check.in|ホテル着/.test(a)) return '🏨'
  if (/チェックアウト|check.out|出発/.test(a)) return '🧳'
  if (/神社|寺|仏|shrine|temple/.test(a)) return '⛩️'
  if (/城|お城|castle/.test(a)) return '🏯'
  if (/博物館|美術館|資料館|museum/.test(a)) return '🏛️'
  if (/公園|garden|庭園/.test(a)) return '🌿'
  if (/海|ビーチ|beach/.test(a)) return '🏖️'
  if (/山|登山|hiking/.test(a)) return '⛰️'
  if (/買い物|ショッピング|土産|みやげ/.test(a)) return '🛍️'
  if (/カフェ|cafe|コーヒー/.test(a)) return '☕'
  if (/散策|散歩|観光|見学|巡り/.test(a)) return '🗺️'
  if (/写真|撮影|フォト/.test(a)) return '📸'
  return '📍'
}
 
function renderTravelPlans(plans) {
  if (!plans || !plans.length) return
  _lastTravelPlans = plans
 
  const wrap = document.createElement('div')
  wrap.className = 'travel-plan-wrap'
  const tabId = 'tp-' + Date.now()
 
  wrap.innerHTML = `
    <div class="tp-header">✈️ 旅行プラン ${plans.length}案</div>
 
    <!-- プランタブ -->
    <div class="tp-tabs" id="${tabId}">
      ${plans.map((p, i) => `
        <button class="tp-tab ${i===0?'active':''}"
          id="${tabId}-tab-${i}"
          onclick="switchTravelPlan('${tabId}',${i})">
          <span class="tp-tab-label">${p.theme || ('プラン' + (p.plan_id||i+1))}</span>
          ${p.total_days ? `<span class="tp-tab-days">${p.total_days}日</span>` : ''}
        </button>`).join('')}
    </div>
 
    <!-- プランパネル -->
    ${plans.map((p, pi) => `
      <div id="${tabId}-panel-${pi}" class="tp-panel" style="display:${pi===0?'block':'none'}">
 
        <!-- サマリーカード -->
        <div class="tp-summary">
          <div class="tp-summary-title">${p.title || '旅行プラン'}</div>
          <div class="tp-summary-tags">
            ${p.theme            ? `<span class="tp-tag tp-tag-blue">${p.theme}</span>` : ''}
            ${p.total_days       ? `<span class="tp-tag">📅 ${p.total_days}日間</span>` : ''}
            ${p.budget_per_person? `<span class="tp-tag">💴 ${p.budget_per_person}/人</span>` : ''}
          </div>
          ${p.highlight ? `<div class="tp-highlight">✨ ${p.highlight}</div>` : ''}
        </div>
 
        <!-- 日程 -->
        ${(p.days||[]).map((d, di) => `
          <div class="tp-day">
 
            <!-- 日付バー -->
            <div class="tp-day-header">
              <div class="tp-day-badge">${d.day||di+1}</div>
              <div class="tp-day-info">
                <div class="tp-day-label">${d.date_label || ((d.day||di+1)+'日目')}</div>
                ${d.location ? `<div class="tp-day-loc">📍 ${d.location}</div>` : ''}
              </div>
            </div>
 
            <!-- 移動情報バナー -->
            ${d.transport ? `
              <div class="tp-transport">
                <span class="tp-transport-icon">🚄</span>
                <span class="tp-transport-text">${d.transport}</span>
              </div>` : ''}
 
            <!-- タイムライン -->
            <div class="tp-timeline">
              ${(d.schedule||[]).map((s, si) => `
                <div class="tp-item">
                  <div class="tp-item-left">
                    <div class="tp-item-icon">${travelActivityIcon(s.activity)}</div>
                    ${si < (d.schedule||[]).length-1 ? '<div class="tp-item-line"></div>' : ''}
                  </div>
                  <div class="tp-item-body">
                    ${s.time ? `<div class="tp-item-time">${s.time}</div>` : ''}
                    <div class="tp-item-card">
                      <div class="tp-item-name">${s.activity||''}</div>
                      <div class="tp-item-meta">
                        ${s.duration ? `<span>⏱ ${s.duration}</span>` : ''}
                        ${s.note     ? `<span class="tp-item-note">💡 ${s.note}</span>` : ''}
                      </div>
                    </div>
                  </div>
                </div>`).join('')}
            </div>
 
            <!-- 宿泊カード -->
            ${d.hotel ? `
              <div class="tp-hotel">
                <div class="tp-hotel-left">
                  <span class="tp-hotel-icon">🏨</span>
                  <div>
                    <div class="tp-hotel-name">${d.hotel.name||''}</div>
                    ${d.hotel.area ? `<div class="tp-hotel-area">📍 ${d.hotel.area}</div>` : ''}
                  </div>
                </div>
                <div class="tp-hotel-right">
                  ${d.hotel.price ? `<div class="tp-hotel-price">¥${Number(d.hotel.price).toLocaleString()}<span>/泊〜</span></div>` : ''}
                  ${d.hotel.url
                    ? `<a href="${d.hotel.url}" target="_blank" class="tp-hotel-btn">予約 →</a>`
                    : (d.hotel.booking_note ? `<div class="tp-hotel-note">${d.hotel.booking_note}</div>` : '')}
                </div>
              </div>` : ''}
          </div>
        `).join('')}
 
        <!-- 詳細相談ボタン -->
        <button class="tp-more-btn"
          onclick="sendChip('プラン${p.plan_id||pi+1}でもっと詳しく教えて')">
          プラン${p.plan_id||pi+1}の詳細を相談する →
        </button>
      </div>
    `).join('')}
  `
 
  document.getElementById('chat-msgs').appendChild(wrap)
  scrollBottom()
}
 
function switchTravelPlan(tabId, idx) {
  // 全パネル非表示・全タブ非アクティブ
  document.querySelectorAll(`[id^="${tabId}-panel-"]`).forEach(el => el.style.display = 'none')
  document.querySelectorAll(`[id^="${tabId}-tab-"]`).forEach(el => el.classList.remove('active'))
  // 選択パネル表示・タブアクティブ
  const panel = document.getElementById(`${tabId}-panel-${idx}`)
  if (panel) panel.style.display = 'block'
  const tab = document.getElementById(`${tabId}-tab-${idx}`)
  if (tab) tab.classList.add('active')
  scrollBottom()
}
 
// ─── ホテルカード描画（旅行AI）───────────────────────────────
// ★ source 引数で将来の複数ホテルAPI対応（現在は 'rakuten' のみ）
function renderHotelCards(hotels, source) {
  if(!hotels || !hotels.length) return
  const sourceLabel = {
    rakuten: '🏨 楽天トラベルのホテル',
    agoda:   '🏨 Agodaのホテル',
    booking: '🏨 Booking.comのホテル',
  }[source] || '🏨 おすすめホテル'
 
  const wrap = document.createElement('div')
  wrap.className = 'hotel-cards'
  wrap.innerHTML = `
    <div style="font-size:12px;color:var(--subtle);margin-bottom:6px;font-weight:600">${sourceLabel}</div>
    ${hotels.map(h => `
      <div class="hotel-card" onclick="window.open('${h.url}','_blank')">
        <div class="hotel-name">${h.name}</div>
        <div class="hotel-meta">
          ${h.review ? `<span>⭐ ${h.review}（${h.review_count}件）</span>` : ''}
          ${h.area   ? `<span>📍 ${h.area}</span>` : ''}
        </div>
        ${h.price  ? `<div class="hotel-price">¥${Number(h.price).toLocaleString()}〜 / 泊</div>` : ''}
        ${h.access ? `<div class="hotel-access">🚉 ${h.access}</div>` : ''}
        <button class="hotel-fav" title="お気に入りに追加"
          onclick="event.stopPropagation();saveHotelAsFavorite(this,'${(h.name||'').replace(/'/g,'&apos;')}','${h.url}',${h.price||0},'${(h.area||'').replace(/'/g,'&apos;')}')">♡</button>
      </div>
    `).join('')}
  `
  document.getElementById('chat-msgs').appendChild(wrap)
  scrollBottom()
}
 
</script>
<div id="mobile-nav-root"></div>
</body>
