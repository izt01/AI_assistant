<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<title>チャット — Lumina AI</title>
<style>
/* ===== 既存スタイル（変更なし） ===== */
.chat-shell{display:flex;flex-direction:column;height:calc(100vh - var(--hh));overflow:hidden}
.chat-topbar{padding:12px 18px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:11px;flex-shrink:0}
.chat-ai-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.chat-ai-name{font-family:'Fraunces',serif;font-size:16px;font-weight:900;color:var(--ink);letter-spacing:-.02em}
.chat-ai-desc{font-size:11px;color:var(--muted)}
.chat-msgs{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:20px;display:flex;flex-direction:column;gap:12px;background:var(--cream)}
.chat-input-area{padding:14px 18px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.chat-input-row{display:flex;gap:9px;align-items:flex-end}
.chat-input-row textarea{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13px;font-family:inherit;resize:none;min-height:44px;max-height:120px;background:var(--cream);transition:all .15s;outline:none;line-height:1.5}
.chat-input-row textarea:focus{border-color:var(--gold2);box-shadow:0 0 0 3px rgba(201,168,76,.1);background:var(--surface)}
.send-btn{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;transition:all .16s;border:none;font-weight:700}
.send-btn:hover{box-shadow:0 4px 14px rgba(201,168,76,.3);transform:scale(1.06)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.msg-row{display:flex;align-items:flex-start;gap:9px}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.msg-bubble{max-width:95%;padding:11px 14px;border-radius:16px;font-size:13px;line-height:1.65}
.msg-row.ai .msg-bubble{background:var(--surface);border:1px solid var(--border);color:var(--ink3);border-radius:4px 16px 16px 16px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.msg-row.user .msg-bubble{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border-radius:16px 4px 16px 16px;font-weight:500}
.msg-time{font-size:10px;color:var(--subtle);margin-top:4px;text-align:right}
.typing-indicator{display:flex;gap:5px;align-items:center;padding:11px 14px}
.ty-dot{width:8px;height:8px;border-radius:50%;background:var(--subtle);animation:ty 1.2s ease infinite}
.ty-dot:nth-child(2){animation-delay:.2s}
.ty-dot:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:99px;padding:5px 12px;font-size:11.5px;color:var(--gold);cursor:pointer;transition:all .15s}
.chip:hover{background:rgba(201,168,76,.15)}
.redirect-card{background:var(--cream2);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-top:10px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .18s}
.redirect-card:hover{border-color:var(--gold2);background:rgba(201,168,76,.04)}
.usage-badge{background:var(--cream2);border:1px solid var(--border);border-radius:99px;padding:4px 11px;font-size:11px;color:var(--muted);white-space:nowrap}
.usage-badge.warn{background:var(--warningbg);border-color:rgba(217,119,6,.25);color:#92400e}
.usage-badge.dngr{background:var(--dangerbg);border-color:rgba(220,38,38,.25);color:#991b1b}
.fb-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;align-items:center}
.fb-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .14s;font-family:inherit}
.fb-btn:hover{background:var(--cream2)}
.fb-btn.active{background:var(--successbg);border-color:rgba(5,150,105,.2);color:var(--success)}
.fb-btn.reaction-love.active{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:#dc2626}
.fb-btn.reaction-helpful.active{background:var(--successbg);border-color:rgba(5,150,105,.2);color:var(--success)}
.fb-btn.reaction-neg.active{background:var(--warningbg);border-color:rgba(217,119,6,.25);color:#92400e}
.fb-done-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border:none;border-radius:8px;padding:4px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .14s}
.fb-done-btn:hover{opacity:.88}
.fb-sep{width:1px;height:16px;background:var(--border);margin:0 2px}
.fav-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .14s;font-family:inherit}
.fav-btn:hover{background:rgba(220,38,38,.05);border-color:rgba(220,38,38,.3);color:#dc2626}
.fav-btn.saved{background:rgba(220,38,38,.07);border-color:rgba(220,38,38,.3);color:#dc2626}
.rest-card{position:relative}
.rest-fav{position:absolute;top:8px;right:30px;background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;transition:all .14s;color:var(--muted)}
.rest-fav:hover,.rest-fav.saved{color:#dc2626;border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.06)}
.product-cards{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .18s;position:relative}
.product-card:hover{border-color:var(--gold2);box-shadow:0 4px 20px rgba(201,168,76,.12);transform:translateY(-1px)}
.product-card-inner{display:flex;gap:0;align-items:stretch}
.product-img-wrap{width:90px;flex-shrink:0;background:var(--cream2);overflow:hidden}
.product-img{width:90px;height:90px;object-fit:cover}
.product-img-placeholder{width:90px;height:90px;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--cream2)}
.product-body{flex:1;min-width:0;padding:11px 38px 11px 12px}
.product-rank{position:absolute;top:8px;left:8px;width:20px;height:20px;background:var(--ink);color:#fff;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.product-name{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:5px}
.product-catch{font-size:10.5px;color:var(--muted);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.product-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.product-price{font-family:'Fraunces',serif;font-size:16px;font-weight:900;color:var(--gold)}
.product-shop{font-size:10.5px;color:var(--subtle);padding:2px 6px;background:var(--cream2);border-radius:4px}
.product-review{font-size:10.5px;color:var(--muted)}
.product-point{font-size:10px;color:#dc2626;font-weight:600}
.product-fav{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .14s;color:var(--muted)}
.product-fav:hover,.product-fav.saved{color:#dc2626;border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.06)}
.prod-detail-img{width:100%;max-height:200px;object-fit:contain;border-radius:8px;background:var(--cream2);margin-bottom:14px}
.prod-detail-price{font-family:'Fraunces',serif;font-size:24px;font-weight:900;color:var(--gold);margin-bottom:8px}
.prod-detail-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.prod-detail-tag{font-size:11.5px;padding:3px 9px;border-radius:6px;background:var(--cream2);color:var(--muted)}
.compare-wrap{margin-top:12px;overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
.compare-table{width:100%;border-collapse:collapse;font-size:12px}
.compare-table th{background:var(--ink);color:#fff;padding:8px 10px;text-align:left;font-weight:600;white-space:nowrap}
.compare-table td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.compare-table tr:last-child td{border-bottom:none}
.compare-table tr:hover td{background:var(--cream2)}
.compare-table .best{color:var(--success);font-weight:700}
.compare-table .rank1{background:rgba(201,168,76,.06)}
.product-badge-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.product-badge{font-size:9.5px;padding:2px 7px;border-radius:99px;font-weight:600;white-space:nowrap}
.badge-cheap{background:rgba(220,38,38,.1);color:#dc2626}
.badge-popular{background:rgba(201,168,76,.12);color:#a07c20}
.badge-new{background:rgba(59,130,246,.1);color:#2563eb}
.badge-point{background:rgba(16,185,129,.1);color:#059669}
.prod-detail-section{margin-bottom:14px}
.prod-detail-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.prod-feature-list{display:flex;flex-direction:column;gap:4px}
.prod-feature-item{font-size:12px;color:var(--ink3);display:flex;gap:6px;align-items:flex-start}
.hotel-cards{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.hotel-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;transition:all .15s;position:relative}
.hotel-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.hotel-name{font-family:'Fraunces',serif;font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:5px}
.hotel-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--muted);margin-bottom:6px}
.hotel-price{font-family:'Fraunces',serif;font-size:14px;font-weight:700;color:var(--gold)}
.hotel-access{font-size:11px;color:var(--subtle);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hotel-fav{position:absolute;top:10px;right:10px;background:transparent;border:none;font-size:15px;cursor:pointer;color:var(--muted);transition:all .14s;padding:2px}
.hotel-fav:hover,.hotel-fav.saved{color:#dc2626}

/* ===== ★ 追加: 近隣店舗カード（買い物AI・料理AI 共通）===== */
.nearby-stores{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.nearby-store-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .16s;text-decoration:none}
.nearby-store-card:hover{border-color:var(--gold2);background:rgba(201,168,76,.03);transform:translateY(-1px);box-shadow:0 3px 12px rgba(201,168,76,.1)}
.store-rank{width:24px;height:24px;border-radius:50%;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.store-body{flex:1;min-width:0}
.store-name{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.store-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:2px}
.store-rating{font-size:11px;color:var(--gold);font-weight:600}
.store-open{font-size:10px;background:rgba(22,163,74,.1);color:#16a34a;padding:1px 7px;border-radius:20px;font-weight:600}
.store-closed{font-size:10px;background:rgba(220,38,38,.08);color:#dc2626;padding:1px 7px;border-radius:20px}
.store-addr{font-size:11px;color:var(--subtle);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.store-arrow{font-size:18px;color:var(--subtle);flex-shrink:0}
/* ════ 旅行プランカード tp-* ════ */
.travel-plan-wrap{margin-top:12px}
.tp-header{font-size:12px;font-weight:700;color:var(--subtle);margin-bottom:10px;letter-spacing:.03em}
.tp-tabs{display:flex !important;flex-direction:row !important;gap:6px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;flex-wrap:nowrap}
.tp-tabs::-webkit-scrollbar{display:none}
.tp-tab{flex-shrink:0;display:flex !important;flex-direction:column !important;align-items:center;gap:2px;padding:8px 14px;border-radius:10px;background:var(--cream2);border:1.5px solid var(--border);color:var(--muted);font-family:inherit;cursor:pointer;transition:all .18s;min-width:72px;text-align:center}
.tp-tab.active{background:linear-gradient(135deg,var(--gold),var(--gold2)) !important;border-color:transparent !important;color:var(--ink) !important;box-shadow:0 3px 10px rgba(201,168,76,.25)}
.tp-tab-label{font-size:12px;font-weight:700;display:block}
.tp-tab-days{font-size:10px;opacity:.75;display:block}
.tp-panel{animation:fadeUp .2s ease both}
.tp-summary{background:linear-gradient(135deg,rgba(100,149,237,.08),rgba(100,149,237,.03));border:1px solid rgba(100,149,237,.2);border-radius:14px;padding:14px 16px;margin-bottom:16px}
.tp-summary-title{font-size:14.5px;font-weight:800;color:var(--ink);margin-bottom:8px;line-height:1.4;font-family:'Fraunces',serif}
.tp-summary-tags{display:flex !important;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.tp-tag{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--cream2);color:var(--muted);border:1px solid var(--border)}
.tp-tag-blue{background:rgba(100,149,237,.13);color:#4a7de8;border-color:rgba(100,149,237,.25);font-weight:700}
.tp-highlight{font-size:11.5px;color:var(--ink3);line-height:1.6}
.tp-day{margin-bottom:20px}
.tp-day-header{display:flex !important;flex-direction:row !important;align-items:center;gap:10px;margin-bottom:10px}
.tp-day-badge{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#6495ed,#4a7de8);color:#fff;font-size:13px;font-weight:800;display:flex !important;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 8px rgba(100,149,237,.3)}
.tp-day-info{flex:1;min-width:0}
.tp-day-label{font-size:13.5px;font-weight:700;color:var(--ink);font-family:'Fraunces',serif}
.tp-day-loc{font-size:11px;color:var(--muted);margin-top:1px}
.tp-transport{display:flex !important;align-items:center;gap:8px;background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:7px 12px;margin-bottom:10px;font-size:11.5px;color:var(--ink3);line-height:1.5}
.tp-transport-icon{font-size:16px;flex-shrink:0}
.tp-transport-text{flex:1}
.tp-transport-btn{margin-left:auto;flex-shrink:0;font-size:11px;padding:4px 10px;border-radius:6px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--gold);text-decoration:none;white-space:nowrap;font-weight:600;cursor:pointer;font-family:inherit}
.tp-transport-btn:hover{background:rgba(201,168,76,.2)}
.tp-timeline{padding-left:4px}
.tp-item{display:flex !important;flex-direction:row !important;gap:10px;align-items:flex-start}
.tp-item-left{display:flex !important;flex-direction:column !important;align-items:center;flex-shrink:0;width:36px}
.tp-item-icon{width:34px;height:34px;border-radius:50%;background:var(--surface);border:2px solid var(--border);display:flex !important;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tp-item-line{width:2px;flex:1;min-height:14px;background:linear-gradient(to bottom,rgba(100,149,237,.35),rgba(100,149,237,.1));margin:4px 0}
.tp-item-body{flex:1;min-width:0;padding-bottom:12px}
.tp-item-time{font-size:11px;font-weight:700;color:#6495ed;margin-bottom:4px;letter-spacing:.03em}
.tp-item-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tp-item-name{font-size:13px;font-weight:600;color:var(--ink);line-height:1.45;margin-bottom:4px}
.tp-item-meta{display:flex;flex-wrap:wrap;gap:6px;font-size:10.5px;color:var(--subtle)}
.tp-item-note{color:var(--muted);border-left:2px solid var(--border);padding-left:6px}
.tp-item-book-btn{display:inline-flex;align-items:center;gap:3px;margin-top:5px;font-size:10.5px;padding:3px 9px;border-radius:5px;background:rgba(100,149,237,.1);border:1px solid rgba(100,149,237,.25);color:#4a7de8;text-decoration:none;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
.tp-hotel{display:flex !important;align-items:center;justify-content:space-between;gap:10px;background:rgba(201,168,76,.06);border:1.5px solid rgba(201,168,76,.2);border-radius:12px;padding:11px 14px;margin-top:6px;margin-bottom:4px}
.tp-hotel-left{display:flex !important;align-items:center;gap:10px;flex:1;min-width:0}
.tp-hotel-icon{font-size:22px;flex-shrink:0}
.tp-hotel-name{font-size:12.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tp-hotel-area{font-size:10.5px;color:var(--muted);margin-top:2px}
.tp-hotel-right{display:flex !important;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.tp-hotel-price{font-family:'Fraunces',serif;font-size:15px;font-weight:900;color:var(--gold)}
.tp-hotel-price span{font-size:10px;font-weight:400;color:var(--muted)}
.tp-hotel-btn{font-size:11px;color:var(--gold);text-decoration:none;border:1px solid rgba(201,168,76,.35);border-radius:6px;padding:4px 10px;white-space:nowrap;transition:all .15s}
.tp-hotel-note{font-size:10.5px;color:var(--subtle)}
.tp-more-btn{width:100%;margin-top:10px;padding:12px;background:rgba(100,149,237,.07);border:1.5px solid rgba(100,149,237,.2);border-radius:12px;color:#4a7de8;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s;text-align:center;display:block}
.tp-more-btn:hover{background:rgba(100,149,237,.13)}
@media(max-width:768px){
  .tp-tab{padding:7px 12px;min-width:60px}
  .tp-tab-label{font-size:11px}
  .tp-item-card{padding:8px 10px}
  .tp-hotel{flex-direction:column !important;align-items:flex-start;gap:8px}
  .tp-hotel-right{flex-direction:row !important;align-items:center;gap:10px}
}
</style>
</head>
<body>
<div id="mobile-header-root"></div>
<div id="toast-root"></div>
<div id="modal-root"></div>
<div class="app-layout">
  <div id="sidebar-root"></div>
  <div class="main-wrap">
    <div id="header-root"></div>
    <div class="chat-shell">
      <div class="chat-topbar" id="chat-topbar"></div>
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-input-area">
        <div id="limit-warn" style="display:none;margin-bottom:8px"></div>
        <div class="chat-input-row">
          <textarea id="chat-input" placeholder="メッセージを入力…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)" maxlength="2100"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMsg()">↑</button>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:7px">
          <span style="font-size:10.5px;color:var(--subtle)">Enterで送信 · Shift+Enterで改行</span>
          <span class="usage-badge" id="usage-badge"></span>
        </div>
        <!-- 文字数カウンター -->
        <div id="char-count-wrap" style="margin-top:6px;display:none">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
            <span id="char-count-label" style="font-size:10.5px;color:var(--subtle)">0 / 2000文字</span>
          </div>
          <div style="height:3px;background:var(--border);border-radius:99px;overflow:hidden">
            <div id="char-count-bar" style="height:100%;width:0%;background:var(--gold);border-radius:99px;transition:width .15s,background .15s"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
 
<!-- Feedback modal -->

// セッション復元（URLにsession_idがある場合）
async function resumeSession(sid) {
  try {
    const d = await apiRequest(`/chat/sessions/${sid}/messages`)
    if(!d.messages || d.messages.length === 0) return false

    // セッションIDを復元
    currentSessionId = sid

    // 過去のメッセージをUIに復元
    const msgArea = document.getElementById('chat-msgs')

    // 「過去の会話を再開しました」バナーを表示
    const banner = document.createElement('div')
    banner.style.cssText = 'text-align:center;padding:8px 16px;margin:4px 0;font-size:11.5px;color:var(--muted);background:var(--cream2);border-radius:20px;border:1px solid var(--border)'
    banner.textContent = `📂 過去の会話を再開 · ${d.messages.length}件のメッセージを復元`
    msgArea.appendChild(banner)

    // メッセージを復元
    for (const m of d.messages) {
      if(m.role === 'user') {
        addMessage('user', m.content)
        messages.push({ role: 'user', content: m.content })
      } else if(m.role === 'assistant') {
        addMessage('ai', m.content)
        messages.push({ role: 'assistant', content: m.content })
        // extraがあればカード類も復元（ホテル・商品カードなど）
        if(m.extra) {
          try {
            const extra = typeof m.extra === 'string' ? JSON.parse(m.extra) : m.extra
            // ホテルカード復元
            if(extra._hotels && extra._hotels.length > 0) renderHotelCards(extra._hotels, msgArea)
            // 旅行プラン復元
            if(extra.plans && extra.plans.length > 0) renderTravelPlans(extra.plans, msgArea)
          } catch(e) { /* extra復元失敗は無視 */ }
        }
      }
    }

    scrollBottom(true)
    return true
  } catch(e) {
    console.warn('[resumeSession] 復元失敗:', e)
    return false
  }
}
 
// ─── 楽天市場 ブラウザ直接検索（買い物AI・家電AI）─────────
async function searchRakutenDirect(keyword, maxResults=6, minPrice=null, maxPrice=null) {
  if(!_rakutenAppId) { console.warn('[Rakuten] AppID未設定'); return null }
  try {
    const params = new URLSearchParams({
      applicationId: _rakutenAppId,
      keyword,
      hits:          maxResults,
      sort:          'standard',
      availability:  1,
      imageFlag:     1,
      formatVersion: 2,
    })
    if(minPrice) params.append('minPrice', minPrice)
    if(maxPrice) params.append('maxPrice', maxPrice)
    const r = await fetch('https://app.rakuten.co.jp/services/api/IchibaItem/Search/20170706?' + params)
    const data = await r.json()
    console.log('[Rakuten] keyword=' + keyword + ' items=' + (data.Items||[]).length)
    if(data.error) { console.warn('[Rakuten] error:', data.error); return null }
    return (data.Items || []).map(item => ({
      name:         (item.itemName||'').slice(0,80),
      price:        item.itemPrice,
      shop:         item.shopName,
      url:          item.itemUrl,
      image:        (item.mediumImageUrls||[])[0] || '',
      review:       item.reviewAverage,
      review_count: item.reviewCount,
      catchcopy:    (item.catchcopy||'').slice(0,60),
      point:        item.pointRate,
    }))
  } catch(e) { console.error('[Rakuten] エラー:', e); return null }
}

// ── Markdownパーサー ─────────────────────────────────────────
function parseMarkdown(text) {
  // JSON生テキストが来た場合はmessageフィールドだけ取り出す
  const cleaned = text.replace(/```json/g,'').replace(/```/g,'').trim()
  if(cleaned.startsWith('{') && (cleaned.includes('"plans"') || cleaned.includes('"needs_more_info"'))) {
    try {
      const p = JSON.parse(cleaned)
      return p.message ? parseMarkdown(p.message) : ''
    } catch(e) {
      // パース失敗: JSONより前のテキスト部分だけ使う
      const ji = text.search(/\{[\s\S]*"(?:message|plans|needs_more_info)"/)
      return ji > 0 ? parseMarkdown(text.slice(0, ji).trim()) : ''
    }
  }
 
  let s = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
 
  // コードブロック
  s = s.replace(/```([\s\S]*?)```/g, (_,c) =>
    `<pre style="background:var(--cream2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:11.5px;overflow-x:auto;margin:6px 0;white-space:pre-wrap;word-break:break-all;">${c.trim()}</pre>`)
  // インラインコード
  s = s.replace(/`([^`]+)`/g, (_,c) =>
    `<code style="background:var(--cream2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:11.5px;">${c}</code>`)
  // 見出し
  s = s.replace(/^### (.+)$/gm,'<strong style="display:block;font-size:13.5px;font-weight:700;color:var(--ink);margin:8px 0 3px;">$1</strong>')
  s = s.replace(/^## (.+)$/gm, '<strong style="display:block;font-size:14px;font-weight:700;color:var(--ink);margin:8px 0 3px;">$1</strong>')
  s = s.replace(/^# (.+)$/gm,  '<strong style="display:block;font-size:15px;font-weight:700;color:var(--ink);margin:8px 0 3px;">$1</strong>')
  // 太字・斜体
  s = s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
  s = s.replace(/\*([^*]+)\*/g,'<em>$1</em>')
  // URLリンク
  s = s.replace(/(https?:\/\/[^\s<>"）)）]+)/g,
    '<a href="$1" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:underline;word-break:break-all;">$1</a>')
  // [text](url)
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:underline;">$1</a>')
  // リスト
  s = s.replace(/^[-・] (.+)$/gm,
    '<div style="display:flex;gap:6px;margin:2px 0;"><span style="color:var(--gold);flex-shrink:0;">•</span><span>$1</span></div>')
  s = s.replace(/^(\d+)\. (.+)$/gm,
    '<div style="display:flex;gap:6px;margin:2px 0;"><span style="color:var(--gold);font-weight:600;flex-shrink:0;min-width:16px;">$1.</span><span>$2</span></div>')
  // 水平線
  s = s.replace(/^---+$/gm,'<hr style="border:none;border-top:1px solid var(--border);margin:8px 0;">')
  // 改行
  s = s.replace(/\n/g,'<br>')
  return s
}
 
function updateUsageBadge() {
  const u = getUser() || {}
  const limit = u.usage_limit || PLANS[u.plan]?.limit || 10
  const used  = u.usage_count || 0
  const remaining = Math.max(0, limit - used)
  const pct = Math.min(100, Math.round(used / limit * 100))
  const badge = document.getElementById('usage-badge')
  if(!badge) return
  badge.className = 'usage-badge' + (pct>=90?' dngr':pct>=70?' warn':'')
  badge.textContent = `残り${remaining}回`
}

const CHAR_LIMIT = 2000
const CHAR_WARN_YELLOW = 1000
const CHAR_WARN_RED = 1800

function autoResize(el) {
  el.style.height='auto'
  el.style.height=Math.min(el.scrollHeight, 120)+'px'
  updateCharCount(el.value.length)
}

function updateCharCount(len) {
  const wrap  = document.getElementById('char-count-wrap')
  const label = document.getElementById('char-count-label')
  const bar   = document.getElementById('char-count-bar')
  const input = document.getElementById('chat-input')
  if(!wrap || !label || !bar) return

  // 1文字以上入力中のみバーを表示
  if(len === 0) {
    wrap.style.display = 'none'
    return
  }
  wrap.style.display = 'block'

  const pct = Math.min(len / CHAR_LIMIT * 100, 100)
  bar.style.width = pct + '%'
  label.textContent = `${len.toLocaleString()} / ${CHAR_LIMIT.toLocaleString()}文字`

  // 色変化
  if(len > CHAR_WARN_RED) {
    bar.style.background = '#ef4444'   // 赤
    label.style.color    = '#ef4444'
  } else if(len > CHAR_WARN_YELLOW) {
    bar.style.background = '#f59e0b'   // 黄
    label.style.color    = '#92400e'
  } else {
    bar.style.background = 'var(--gold)'
    label.style.color    = 'var(--subtle)'
  }
}
 
// ─── メッセージ送信 ───────────────────────────────────────────
async function sendMsg() {
  const input = document.getElementById('chat-input')
  const text = input.value.trim()
  if(!text || isTyping) return

  // 文字数上限チェック（2000文字超はモーダルで警告・送信不可）
  if(text.length > CHAR_LIMIT) {
    showModal({
      title: '⚠️ 文字数制限',
      body: `2000文字以上でテキストを打ち込むことはできません。<br><br>現在 <strong style="color:#ef4444">${text.length.toLocaleString()}文字</strong> 入力されています。<br>2000文字以内に編集してから送信してください。`,
      actions: [{label: '閉じて編集する', cls: 'btn-g', fn: 'closeModal()'}]
    })
    return
  }
 
  const limit = PLANS[user?.plan]?.limit || 10
  if((user?.usage_count||0) >= limit) {
    if(user?.plan==='master') showLimitReachedModal()
    else showUpgradeModal(user?.plan)
    return
  }
 
  input.value = ''
  input.style.height = 'auto'
  document.getElementById('send-btn').disabled = true
  isTyping = true
  document.querySelectorAll('.chip-row').forEach(e=>e.remove())
 
  messages.push({ role:'user', content:text })
  addMessage('user', text)
  scrollBottom(true)
  showTyping()
 
  try {
    // messages が長くなりすぎるとコンテキスト超過でツール呼び出しが失敗するため
    // 直近 20 件（最新のやり取り10往復分）だけ送る
    const MESSAGES_LIMIT = 20
    const trimmedMessages = messages.length > MESSAGES_LIMIT
      ? messages.slice(-MESSAGES_LIMIT)
      : messages

    // グルメ/買い物/料理AI: 位置情報がまだ取得中なら最大3秒待つ
    if((aiParam === 'gourmet' || aiParam === 'shopping' || aiParam === 'cooking')
       && !window._userLat && _locationPromise) {
      try {
        await Promise.race([
          _locationPromise,
          new Promise(r => setTimeout(r, 3000))  // 最大3秒待つ
        ])
      } catch(e) { /* タイムアウトは無視 */ }
    }

    const resp = await apiRequest('/chat', {
      method: 'POST',
      body: {
        ai_type:        aiParam,
        messages:       trimmedMessages,
        session_id:     currentSessionId,
        lat:            window._userLat || null,
        lng:            window._userLng || null,
        fallback_state: _fallbackState || undefined,
      }
    })
 
    hideTyping()
    currentSessionId = resp.session_id
    lastMessageId    = resp.message_id
    // フォールバックモードのシナリオ状態を保持
    if(resp.fallback_state !== undefined) _fallbackState = resp.fallback_state
    lastProposalId   = resp.proposal_id || null
    lastReactionDone = false
 
    // replyがJSON全体になってしまった場合の安全策
    // （base.pyが古い版の場合など、サーバーがJSON全体をreplyとして返すケースに対応）
    let reply = resp.reply || ''
    // extra.plans（base.pyが直接渡す）→ _travel_plans → replyのJSON の優先順で取得
    let extraPlans = (resp.extra && resp.extra.plans)
                  || (resp.extra && resp.extra._travel_plans)
                  || null
 
    // replyにJSONが混入している場合、messageだけ取り出してplansも救済
    const looksJson = reply.replace(/```json|```/g,'').trimStart().startsWith('{')
    if(looksJson) {
      const cleaned = reply.replace(/```json/g,'').replace(/```/g,'').trim()

      // ① まず正常パースを試みる
      let parsedOk = false
      try {
        const parsed = JSON.parse(cleaned)
        if(parsed.message) reply = parsed.message
        if(parsed.plans && parsed.plans.length && !extraPlans) {
          extraPlans = parsed.plans
          console.log('[Travel] replyからplans救済(正常):', extraPlans.length, '案')
        }
        parsedOk = true
      } catch(e) { /* 途中切れの可能性 */ }

      // ② パース失敗時: 正規表現でmessageとplansを個別に抽出
      if(!parsedOk) {
        const mMsg = cleaned.match(/"message"\s*:\s*"((?:[^"\\]|\\.)*)"/)
        if(mMsg) reply = mMsg[1].replace(/\\n/g,'\n').replace(/\\"/g,'"')
        else reply = ''

        if(!extraPlans) {
          try {
            const plansMatch = cleaned.match(/"plans"\s*:\s*(\[)/)
            if(plansMatch) {
              const start = cleaned.indexOf(plansMatch[1], cleaned.indexOf('"plans"'))
              let depth = 0, end = start
              for(let i = start; i < cleaned.length; i++) {
                if(cleaned[i] === '[') depth++
                else if(cleaned[i] === ']') { depth--; if(depth === 0){ end = i; break } }
              }
              const plansStr = cleaned.slice(start, end+1)
              extraPlans = JSON.parse(plansStr)
              console.log('[Travel] replyからplans救済(正規表現):', extraPlans.length, '案')
            }
          } catch(e2) {
            console.warn('[Travel] plans抽出失敗:', e2.message)
          }
        }
      }
    }
 
    // reply が空（JSONパース結果が空、または message フィールドなし）の場合の代替処理
    if(!reply && extraPlans && extraPlans.length) {
      // 旅行プランはカードで表示するので reply 空でも問題なし（何も表示しない）
      reply = ''
    } else if(!reply && resp.extra && (resp.extra._hotels || resp.extra._products || resp.extra._places)) {
      // ホテル・商品・スポットカードがある場合も同様
      reply = ''
    } else if(!reply) {
      // それ以外で reply が空なら汎用メッセージ
      reply = '少々お待ちください。もう一度お試しください。'
      console.warn('[Chat] reply が空でした。サーバーレスポンス:', resp)
    }
    messages.push({ role:'assistant', content:reply })
    if(reply) addMessage('ai', reply)
 
    if(resp.learning_applied > 0) {
      toast(`✦ AIがあなたの好みを${resp.learning_applied}件学習しました`, '')
    }
 
    if(user) { user.usage_count = resp.usage_count || (user.usage_count||0)+1; setCachedUser(user) }
 
    // ── extra 内の API 結果をAI種別ごとに描画 ──────────────
 
    // グルメAI: Google Maps 飲食店
    if(aiParam === 'gourmet' && resp.extra && resp.extra._places) {
      handleGourmetExtra(resp.extra)
    }
 
    // 旅行AI: 旅行プランカード（extra._travel_plans または reply から抽出したplans）
    if(aiParam === 'travel' && extraPlans && extraPlans.length > 0) {
      renderTravelPlans(extraPlans)
    }
 
    // 旅行AI: 航空券カード（Amadeus）
    if(aiParam === 'travel' && resp.extra && resp.extra._flights && resp.extra._flights.flights && resp.extra._flights.flights.length > 0) {
      renderFlightCards(resp.extra._flights)
    }
    // 旅行AI: ツアー・体験カード
    if(aiParam === 'travel' && resp.extra && resp.extra._tours && resp.extra._tours.tours && resp.extra._tours.tours.length > 0) {
      renderTourCards(resp.extra._tours)
    }

    // 旅行AI: フライトAPI失敗時のスカイスキャナーfallbackカード
    if(aiParam === 'travel' && resp.extra && resp.extra._flight_fallback) {
      renderFlightFallbackCard(resp.extra._flight_fallback)
    }
 
    // 旅行AI: 国内ホテルカード（楽天）
    if(resp.extra && resp.extra._hotels && resp.extra._hotels.hotels && resp.extra._hotels.hotels.length > 0) {
      renderHotelCards(
        resp.extra._hotels.hotels,
        resp.extra._hotels.source || 'rakuten'
      )
    }

    // 旅行AI: 海外ホテルカード（Booking.com）
    if(resp.extra && resp.extra._overseas_hotels) {
      renderOverseasHotelCards(resp.extra._overseas_hotels)
    }
 
    // 料理AI: Google Maps 近隣スーパー ★新規追加
    if(aiParam === 'cooking' && resp.extra && resp.extra._nearby_stores) {
      renderNearbyStores(resp.extra._nearby_stores.places || [], 'cooking')
    }
 
    // ── 商品カード描画 ──────────────────────────────────────────
    // 家電AI(home/appliance): バックエンドが検索済みの _products を優先使用
    if(aiParam === 'home' && resp.extra && resp.extra._products) {
      renderProductCards(resp.extra._products.items || [], 'appliance')
 
    // 買い物AI: バックエンドの _products を最優先、なければフロントから楽天直接検索
    } else if(aiParam === 'shopping') {
      if(resp.extra && resp.extra._products && resp.extra._products.items?.length > 0) {
        // ① バックエンドが検索済みの結果をそのまま使用
        renderProductCards(resp.extra._products.items, 'shopping')
        if(resp.extra._nearby_stores) {
          renderNearbyStores(resp.extra._nearby_stores.places || [], 'shopping')
        }
      } else if(_rakutenAppId) {
        // ② バックエンド結果がない場合はフロントから楽天直接検索
        const kwFromAI = resp.extra && resp.extra._search_keyword
        const kw = kwFromAI || (resp.extra?.needs_more_info ? null : extractShoppingKeyword(text, reply))
        console.log('[Shopping] フロント検索 kw=', kw)
        if(kw) {
          const loadingEl = document.createElement('div')
          loadingEl.id = 'product-loading'
          loadingEl.style.cssText = 'text-align:center;padding:16px;color:var(--subtle);font-size:12px'
          loadingEl.textContent = '🛍️ 楽天市場を検索中...'
          document.getElementById('chat-msgs').appendChild(loadingEl)
          scrollBottom()
          ;(async () => {
            const items = await searchRakutenDirect(kw, 6)
            const el = document.getElementById('product-loading')
            if(el) el.remove()
            if(items && items.length > 0) {
              renderProductCards(items, 'shopping')
              if(resp.extra && resp.extra._nearby_stores) {
                renderNearbyStores(resp.extra._nearby_stores.places || [], 'shopping')
              }
            } else {
              console.warn('[Shopping] 商品0件 kw='+kw)
            }
          })()
        }
      }
 
    // DIY AI(diy): バックエンドの _products を使用
    } else if(aiParam === 'diy' && resp.extra && resp.extra._products) {
      renderProductCards(resp.extra._products.items || [], 'diy')
 
    // その他AIでバックエンドが _products を返した場合
    } else if(resp.extra && resp.extra._products) {
      renderProductCards(resp.extra._products.items || [])
    }
 
 
    // ── AI誘導カードの表示 ────────────────────────────────
    // 【専門AIの場合】: AIが redirect_to_ai を返したらリダイレクトカード表示
    if(resp.redirect_to_ai && aiParam !== 'all') {
      addRedirectCard(resp.redirect_to_ai, 'redirect')
    }

    // 【総合AIの場合】: routerが専門AIに振り分けた場合、切り替えカードを表示
    if(aiParam === 'all' && resp.agent && resp.agent !== 'general') {
      addRedirectCard(resp.agent, 'switched')
    }

    addActionChips(aiParam, text)
    updateUsageBadge()
 
  } catch(e) {
    hideTyping()
    if(e.error === 'usage_limit_reached') {
      if(user?.plan==='master') showLimitReachedModal()
      else showUpgradeModal(user?.plan)
    } else {
      addMessage('ai', '申し訳ありません。エラーが発生しました。しばらくしてから再度お試しください。')
      toast('エラーが発生しました', 'd')
    }
  } finally {
    isTyping = false
    document.getElementById('send-btn').disabled = false
  }
}
 
// ショッピング検索キーワード抽出（既存）
function extractShoppingKeyword(userText, aiReply) {
  const cleaned = userText
    .replace(/を?(買い?替え|探し|見つけ|教え)?(たい|て|ほしい|ください)/g, '')
    .replace(/(おすすめ|比較|安い|高い|コスパ|良い|いい)(の|な|に)?/g, '')
    .replace(/[。、！？!?\n]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
  if(cleaned.length >= 2) return cleaned
  const match = aiReply.match(/「([^」]{2,20})」/)
  return match ? match[1] : null
}

// ─── 位置情報取得（グルメ・買い物・料理AI 共通）─────────────
let _locationPromise = null  // 取得中のPromiseを保持（重複呼び出し防止）

function requestUserLocation(aiType) {
  // 既に取得済みなら即返す
  if(window._userLat && window._userLng) return Promise.resolve({lat: window._userLat, lng: window._userLng})
  // 取得中なら同じPromiseを返す
  if(_locationPromise) return _locationPromise

  if(!navigator.geolocation) return Promise.resolve(null)

  _locationPromise = new Promise(resolve => {
    navigator.geolocation.getCurrentPosition(
      pos => {
        window._userLat = pos.coords.latitude
        window._userLng = pos.coords.longitude
        console.log(`[${aiType}] 位置情報取得:`, window._userLat, window._userLng)
        // 取得成功の通知をチャットに表示
        const notice = document.createElement('div')
        notice.style.cssText = 'text-align:center;font-size:11px;color:var(--subtle);margin:6px 0'
        notice.textContent = '📍 現在地を取得しました'
        const msgs = document.getElementById('chat-msgs')
        if(msgs) msgs.appendChild(notice)
        resolve({lat: window._userLat, lng: window._userLng})
      },
      err => {
        console.warn(`[${aiType}] 位置情報取得失敗:`, err.message)
        resolve(null)
      },
      { enableHighAccuracy: false, timeout: 8000 }
    )
  })
  return _locationPromise
}

// ページロード直後から位置情報取得を開始する
function prefetchLocationIfNeeded() {
  if(aiParam === 'gourmet' || aiParam === 'shopping' || aiParam === 'cooking' || aiParam === 'travel') {
    requestUserLocation(aiParam)  // バックグラウンドで取得開始
  }
}

function showCompareTable() {
  if(!_lastProducts.length) return
  const items     = _lastProducts.slice(0, 6)
  const minPrice  = Math.min(...items.map(p => p.price  || Infinity))
  const maxReview = Math.max(...items.map(p => p.review || 0))
  const maxPoint  = Math.max(...items.map(p => p.point  || 0))
 
  // 各商品のスコアを算出（価格・評価・ポイントの総合評価）
  function calcScore(p) {
    let s = 0
    if(p.price  === minPrice)                      s += 3
    else if(p.price <= minPrice * 1.1)             s += 2
    else if(p.price <= minPrice * 1.2)             s += 1
    if(p.review >= 4.5)                            s += 3
    else if(p.review >= 4.0)                       s += 2
    else if(p.review >= 3.5)                       s += 1
    if(p.point  >= 5)                              s += 2
    else if(p.point >= 3)                          s += 1
    if(/送料無料/.test(p.catchcopy||''))           s += 1
    if(/日本製|国産/.test((p.name||'')+(p.catchcopy||''))) s += 1
    return s
  }
  const scores    = items.map(calcScore)
  const maxScore  = Math.max(...scores)
 
  // バッジ生成
  function badges(p, score, idx) {
    const bs = []
    if(p.price  === minPrice)  bs.push('<span style="background:rgba(220,38,38,.12);color:#dc2626;font-size:9.5px;padding:2px 7px;border-radius:20px;font-weight:700;white-space:nowrap">💰 最安値</span>')
    if(p.review === maxReview && maxReview > 0) bs.push('<span style="background:rgba(201,168,76,.12);color:#a07c20;font-size:9.5px;padding:2px 7px;border-radius:20px;font-weight:700;white-space:nowrap">⭐ 最高評価</span>')
    if(score    === maxScore)  bs.push('<span style="background:rgba(16,185,129,.1);color:#059669;font-size:9.5px;padding:2px 7px;border-radius:20px;font-weight:700;white-space:nowrap">✦ 総合おすすめ</span>')

// ── transport文字列から出発・到着時刻を抽出 ────────────────────
function parseTransport(transport) {
  if(!transport) return null
  // "東京駅 07:26発 → 金沢駅 09:57着: ..." のパターン
  const timePattern = /(\d{1,2}:\d{2})[発発]\s*[→→\-]\s*(?:.*?\s+)?(\d{1,2}:\d{2})[着着]/
  const m = transport.match(timePattern)
  if(m) return { dep: m[1], arr: m[2] }
  // "07:26→09:57" のような簡略パターン
  const simplePattern = /(\d{1,2}:\d{2})\s*[→→\-]\s*(\d{1,2}:\d{2})/
  const m2 = transport.match(simplePattern)
  if(m2) return { dep: m2[1], arr: m2[2] }
  return null
}
 
// ── えきねっとディープリンクURL生成 ──────────────────────────────
function ekiNetUrl(transport, fromCity, toCity) {
  // えきねっとは出発駅・到着駅をパラメータで渡せる
  const from = encodeURIComponent(fromCity || '')
  const to   = encodeURIComponent(toCity   || '')
  if(from && to) {
    return `https://www.eki-net.com/travel/shinkansen/reserve/ReserveStart.aspx?dep=${from}&arr=${to}`
  }
  return 'https://www.eki-net.com/travel/shinkansen/'
}
 
// ── 交通手段から予約ディープリンクURLを生成 ────────────────────
function travelBookingUrl(transport, fromCity, toCity, date) {
  if(!transport) return null
  const t = transport
  const from = fromCity || ''
  const to   = toCity   || ''
  const d    = (date || '').replace(/-/g, '')  // YYYYMMDD
 
  // 新幹線・JR → えきねっと
  if (/新幹線|JR|jr|のぞみ|ひかり|こだま|はやぶさ|かがやき|つるぎ/.test(t)) {
    // えきねっとの列車検索URL（出発地・目的地・日付）
    const params = new URLSearchParams({
      'typeCD': 'B',  // 新幹線
      'dep': from,
      'arr': to,
    })
    return `https://www.eki-net.com/travel/shinkansen/reserve/ReserveStart.aspx`
  }
 
  // 飛行機 → スカイスキャナー（国内・海外両対応）
  if (/飛行機|フライト|航空|ANA|JAL|LCC|空港/.test(t)) {
    // 都市名 → IATAコード（国内+主要海外）
    const IATA = {
      '東京':'TYO','羽田':'HND','成田':'NRT','大阪':'OSA','伊丹':'ITM','関西':'KIX',
      '名古屋':'NGO','中部':'NGO','札幌':'CTS','新千歳':'CTS','福岡':'FUK',
      '沖縄':'OKA','那覇':'OKA','金沢':'KMQ','小松':'KMQ','広島':'HIJ',
      '仙台':'SDJ','鹿児島':'KOJ','長崎':'NGS','熊本':'KMJ','石垣':'ISG',
      // 海外主要都市
      'ローマ':'FCO','フィレンツェ':'FLR','ミラノ':'MXP','ベネチア':'VCE',
      'パリ':'CDG','ロンドン':'LHR','バルセロナ':'BCN','マドリード':'MAD',
      'アムステルダム':'AMS','フランクフルト':'FRA','ベルリン':'TXL',
      'ミュンヘン':'MUC','プラハ':'PRG','ウィーン':'VIE','ブリュッセル':'BRU',
      'リスボン':'LIS','アテネ':'ATH','イスタンブール':'IST','ドバイ':'DXB',
      'バンコク':'BKK','シンガポール':'SIN','クアラルンプール':'KUL',
      'バリ':'DPS','ジャカルタ':'CGK','マニラ':'MNL','セブ':'CEB',
      'ソウル':'ICN','台北':'TPE','香港':'HKG','上海':'PVG','北京':'PEK',
      'ハノイ':'HAN','ホーチミン':'SGN','プーケット':'HKT','チェンマイ':'CNX',
      'ニューヨーク':'JFK','ロサンゼルス':'LAX','ホノルル':'HNL','ハワイ':'HNL',
      'ラスベガス':'LAS','シカゴ':'ORD','マイアミ':'MIA','サンフランシスコ':'SFO',
      'バンクーバー':'YVR','トロント':'YYZ','シドニー':'SYD','メルボルン':'MEL',
      'オークランド':'AKL','グアム':'GUM','サイパン':'SPN',
    }
    const cityToIata = (city) => {
      for(const [name, code] of Object.entries(IATA)) {
        if(city.includes(name)) return code
      }
      return ''
    }
    const fromCode = cityToIata(from)
    const toCode   = cityToIata(to)
    if (fromCode && toCode) {
      return `https://www.skyscanner.jp/routes/${fromCode}/${toCode}/`
    }
    // コードが取れなくても都市名でスカイスキャナーに飛ばす
    if (from && to) {
      return `https://www.skyscanner.jp/transport/flights/${encodeURIComponent(from)}/${encodeURIComponent(to)}/`
    }
    return `https://www.skyscanner.jp/`
  }
 
  // バス → 高速バスnet
  if (/バス|highway|高速/.test(t)) {
    return `https://www.kosokubus.com/`
  }
 
  // フェリー
  if (/船|フェリー|ferry/.test(t)) {
    return `https://www.ferrysearcher.com/`
  }
 
  return null
}

  document.querySelectorAll(`[id^="${tabId}-panel-"]`).forEach(el => el.style.display = 'none')
  document.querySelectorAll(`[id^="${tabId}-tab-"]`).forEach(el => el.classList.remove('active'))
  // 選択パネル表示・タブアクティブ
  const panel = document.getElementById(`${tabId}-panel-${idx}`)
  if (panel) panel.style.display = 'block'
  const tab = document.getElementById(`${tabId}-tab-${idx}`)
  if (tab) tab.classList.add('active')
  scrollBottom()
}
 
 
// ─── 航空券カード描画（旅行AI / Google Flights Data via RapidAPI）─
function renderFlightCards(data) {
  const flights = data.flights || []
  if (!flights.length) return
 
  const originIata    = data.origin_iata    || ''
  const destIata      = data.dest_iata      || ''
  const date          = data.departure_date || ''
  const dateFmt       = date.replace(/-/g, '')
  const skyscannerTop = `https://www.skyscanner.jp/routes/${originIata}/${destIata}/${dateFmt}/`
 
  const wrap = document.createElement('div')
  wrap.style.cssText = 'margin-top:12px'
 
  wrap.innerHTML = `
    <div style="font-size:12px;font-weight:700;color:var(--subtle);margin-bottom:8px">
      ✈️ フライト検索結果（${originIata} → ${destIata}）
    </div>
 
    ${flights.slice(0,4).map(f => `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;
                  padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s"
           onclick="window.open('${f.book_url}','_blank')"
           onmouseover="this.style.borderColor='rgba(100,149,237,.4)'"
           onmouseout="this.style.borderColor='var(--border)'">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
 
          <!-- 航空会社 -->
          <div style="flex-shrink:0;width:46px;text-align:center">
            <div style="font-size:20px">✈️</div>
            <div style="font-size:9.5px;font-weight:700;color:var(--muted);margin-top:1px">${f.airline||'各社'}</div>
          </div>
 
          <!-- 時刻ライン -->
          <div style="flex:1;min-width:140px">
            ${f.departure_time && f.arrival_time ? `
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
                <span style="font-family:'Fraunces',serif;font-size:18px;font-weight:900;color:var(--ink)">${f.departure_time}</span>
                <div style="flex:1;position:relative;border-top:1.5px solid var(--border)">
                  <div style="position:absolute;top:-8px;left:50%;transform:translateX(-50%);
                              font-size:9px;color:var(--muted);white-space:nowrap;
                              background:var(--surface);padding:0 3px">
                    ${f.duration}${f.direct ? '' : ' (乗継)'}
                  </div>
                </div>
                <span style="font-family:'Fraunces',serif;font-size:18px;font-weight:900;color:#4a7de8">${f.arrival_time}</span>
              </div>` : `
              <div style="font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:3px">
                ${f.airline||'各社'} ${f.flight_number||''}
              </div>`}
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              ${f.flight_number ? `<span style="font-size:10px;color:var(--subtle)">${f.flight_number}</span>` : ''}
              ${f.direct ? `<span style="font-size:10px;background:rgba(22,163,74,.1);color:#16a34a;
                                         padding:1px 6px;border-radius:4px;font-weight:600">直行</span>` : ''}
            </div>
          </div>
 
          <!-- 料金 -->
          <div style="flex-shrink:0;text-align:right">
            <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:900;color:#4a7de8">
              ¥${Number(f.price).toLocaleString()}
            </div>
            <div style="font-size:10px;color:var(--muted)">大人1名〜</div>
          </div>
        </div>
      </div>`).join('')}
 
    <!-- スカイスキャナー予約ボタン -->
    <a href="${skyscannerTop}" target="_blank"
       style="display:flex;align-items:center;justify-content:center;gap:6px;
              padding:11px;border:1.5px solid rgba(100,149,237,.25);border-radius:10px;
              color:#4a7de8;font-size:12.5px;font-weight:700;text-decoration:none;
              background:rgba(100,149,237,.05);transition:all .15s"
       onmouseover="this.style.background='rgba(100,149,237,.1)'"
       onmouseout="this.style.background='rgba(100,149,237,.05)'">
      スカイスキャナーで予約する →
    </a>
    <div style="font-size:10px;color:var(--subtle);text-align:center;margin-top:4px">
      ※料金はGoogle Flightsの目安です。実際の空き状況はスカイスキャナーでご確認ください
    </div>
  `
  document.getElementById('chat-msgs').appendChild(wrap)
  scrollBottom()
}
 
// ─── ホテルカード描画（旅行AI）───────────────────────────────

    agoda:   '🏨 Agodaのホテル',
    booking: '🏨 Booking.comのホテル',
  }[source] || '🏨 おすすめホテル'
 
  const wrap = document.createElement('div')
  wrap.className = 'hotel-cards'
  wrap.innerHTML = `
    <div style="font-size:12px;color:var(--subtle);margin-bottom:6px;font-weight:600">${sourceLabel}</div>
    ${hotels.map(h => `
      <div class="hotel-card" onclick="window.open('${h.url}','_blank')">

        <div class="hotel-meta">
          ${h.review ? `<span>⭐ ${h.review}（${h.review_count}件）</span>` : ''}
          ${h.area   ? `<span>📍 ${h.area}</span>` : ''}
        </div>
        ${h.price  ? `<div class="hotel-price">¥${Number(h.price).toLocaleString()}〜 / 泊</div>` : ''}

          onclick="event.stopPropagation();saveHotelAsFavorite(this,'${(h.name||'').replace(/'/g,'&apos;')}','${h.url}',${h.price||0},'${(h.area||'').replace(/'/g,'&apos;')}')">♡</button>
      </div>

  `

// ─── ツアー・体験カード（旅行AI / Google検索結果）──────────────
function renderTourCards(data) {
  const tours = data.tours || []
  if (!tours.length) return

  const dest    = data.destination || ''
  const keyword = data.keyword || ''
  const query   = data.search_query || ''
  const wrap    = document.createElement('div')
  wrap.style.cssText = 'margin-top:14px'

  const header = dest
    ? `🎫 ${dest}${keyword ? ' / ' + keyword : ''}のツアー・体験`
    : '🎫 ツアー・体験 検索結果'

  wrap.innerHTML = `
    <div style="font-size:12px;font-weight:700;color:var(--subtle);margin-bottom:8px">
      ${header}
    </div>

    ${tours.map(t => {
      const hasLink = !!t.url
      const siteBadge = t.site
        ? `<span style="font-size:10px;background:var(--bg);border:1px solid var(--border);
                        padding:1px 6px;border-radius:4px;color:var(--muted);flex-shrink:0">
             ${t.site}
           </span>`
        : ''
      const priceBadge = t.price_hint
        ? `<span style="font-family:'Fraunces',serif;font-size:14px;
                        font-weight:900;color:#4a7de8;flex-shrink:0">
             ${t.price_hint}
           </span>`
        : ''
      return `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;
                    padding:12px 14px;margin-bottom:8px;
                    cursor:${hasLink ? 'pointer' : 'default'};transition:all .15s"
             ${hasLink ? `onclick="window.open('${t.url.replace(/'/g,"\'")}','_blank')"` : ''}
             onmouseover="this.style.borderColor='rgba(100,149,237,.4)';this.style.background='var(--hover,var(--surface))'"
             onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--surface)'">

          <!-- タイトル行 -->
          <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:5px">
            <div style="font-size:13px;font-weight:700;color:var(--ink);line-height:1.45;flex:1;
                        display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">
              ${t.title}
            </div>
          </div>

          <!-- スニペット -->
          ${t.description ? `
            <div style="font-size:11.5px;color:var(--muted);line-height:1.55;margin-bottom:7px;
                        display:-webkit-box;-webkit-line-clamp:2;
                        -webkit-box-orient:vertical;overflow:hidden">
              ${t.description}
            </div>` : ''}

          <!-- フッター：サイト名 + 価格 -->
          <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap">
            ${siteBadge}
            ${priceBadge}
          </div>
        </div>`
    }).join('')}

    <!-- Google検索で詳しく見るリンク -->
    ${query ? `
      <a href="https://www.google.com/search?q=${encodeURIComponent(query)}&gl=jp&hl=ja"
         target="_blank"
         style="display:flex;align-items:center;justify-content:center;gap:5px;
                padding:9px;border:1.5px solid var(--border);border-radius:10px;
                color:var(--muted);font-size:12px;text-decoration:none;margin-top:4px;
                background:var(--surface);transition:all .15s"
         onmouseover="this.style.borderColor='rgba(100,149,237,.4)'"
         onmouseout="this.style.borderColor='var(--border)'">
        🔍 Googleでもっと検索する
      </a>` : ''}

    <div style="font-size:10px;color:var(--subtle);text-align:center;margin-top:6px">
      ※ Google検索の結果です。詳細・料金は各サイトにてご確認ください
    </div>
  `
  document.getElementById('chat-msgs').appendChild(wrap)
  scrollBottom()
}

// ─── 海外ホテルカード描画（旅行AI: Booking.com）──────────────
function renderOverseasHotelCards(data) {
  const hotels = data.hotels || []
  const fallback = data.fallback_urls || {}
  const cityName = data.city || data.city_en || '目的地'

  // ホテルが0件またはAPIエラーの場合 → フォールバックURLカード
  if(!hotels.length) {
    const wrap = document.createElement('div')
    wrap.className = 'hotel-cards'
    wrap.innerHTML = `
      <div style="font-size:12px;color:var(--subtle);margin-bottom:6px;font-weight:600">🌏 海外ホテルを検索する</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${cityName}のホテルを各サイトで検索できます</div>
      ${fallback.booking_search_url ? `
      <div class="hotel-card" onclick="window.open('${fallback.booking_search_url}','_blank')" style="display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">🔵</span>
        <div>
          <div class="hotel-name">Booking.com で検索</div>
          <div class="hotel-meta"><span>世界最大級のホテル予約サイト</span></div>
        </div>
      </div>` : ''}
      ${fallback.agoda_search_url ? `
      <div class="hotel-card" onclick="window.open('${fallback.agoda_search_url}','_blank')" style="display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">🟠</span>
        <div>
          <div class="hotel-name">Agoda で検索</div>
          <div class="hotel-meta"><span>アジアに強いホテル予約サイト</span></div>
        </div>
      </div>` : ''}
      ${fallback.expedia_search_url ? `
      <div class="hotel-card" onclick="window.open('${fallback.expedia_search_url}','_blank')" style="display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">🟡</span>
        <div>
          <div class="hotel-name">Expedia で検索</div>
          <div class="hotel-meta"><span>フライト+ホテルのセット予約も可</span></div>
        </div>
      </div>` : ''}
    `
    document.getElementById('chat-msgs').appendChild(wrap)
    scrollBottom()
    return
  }

  // ホテルが取得できた場合 → ホテルカード表示
  const wrap = document.createElement('div')
  wrap.className = 'hotel-cards'
  wrap.innerHTML = `
    <div style="font-size:12px;color:var(--subtle);margin-bottom:6px;font-weight:600">🌏 Booking.com の海外ホテル（${cityName}）</div>
    ${hotels.map(h => {
      const stars = h.stars ? '★'.repeat(Math.min(h.stars,5)) : ''
      const price = h.price ? `<div class="hotel-price">¥${Number(h.price).toLocaleString()}〜 / 泊</div>` : ''
      const review = h.review ? `<span>⭐ ${h.review}${h.review_label ? ' '+h.review_label : ''}（${h.review_count}件）</span>` : ''
      const district = h.district || h.address || ''
      const imgHtml = h.image
        ? `<img src="${h.image}" alt="${h.name}" style="width:72px;height:56px;object-fit:cover;border-radius:6px;flex-shrink:0">`
        : `<div style="width:72px;height:56px;border-radius:6px;background:var(--cream2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px">🏨</div>`
      return `
        <div class="hotel-card" onclick="window.open('${h.url || '#'}','_blank')" style="display:flex;gap:10px;align-items:flex-start">
          ${imgHtml}
          <div style="flex:1;min-width:0">
            <div class="hotel-name">${h.name || ''}${stars ? ' <span style="color:var(--gold);font-size:11px">'+stars+'</span>' : ''}</div>
            <div class="hotel-meta">
              ${review}
              ${district ? `<span>📍 ${district}</span>` : ''}
            </div>
            ${price}
          </div>
          <button class="hotel-fav" title="お気に入りに追加"
            onclick="event.stopPropagation();saveHotelAsFavorite(this,'${(h.name||'').replace(/'/g,'&apos;')}','${h.url||''}',${h.price||0},'${cityName}')">♡</button>
        </div>
      `
    }).join('')}
    <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap">
      ${fallback.booking_search_url ? `<a href="${fallback.booking_search_url}" target="_blank" style="font-size:11px;color:var(--gold);text-decoration:none">🔵 Booking.comで他を見る</a>` : ''}
      ${fallback.agoda_search_url   ? `<a href="${fallback.agoda_search_url}"   target="_blank" style="font-size:11px;color:var(--gold);text-decoration:none">🟠 Agodaで探す</a>` : ''}
    </div>
  `
  document.getElementById('chat-msgs').appendChild(wrap)
  scrollBottom()
}
