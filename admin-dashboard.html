<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理者ダッシュボード — Lumina AI</title>
<script src="admin-shared.js"></script>
<link rel="stylesheet" href="admin.css">
<style>
.chart-bar-wrap{display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:8px}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--gold),rgba(201,168,76,.4));
  transition:height .4s ease;min-height:4px;cursor:default;position:relative}
.chart-bar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);background:var(--ink3);border:1px solid var(--border2);
  border-radius:6px;padding:4px 9px;font-size:11px;white-space:nowrap;z-index:10}
.chart-label{font-size:9.5px;color:var(--subtle);font-family:'JetBrains Mono',monospace}

.ai-usage-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ai-usage-row:last-child{border-bottom:none}
.ai-usage-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.ai-usage-name{flex:1;font-size:13px}
.ai-usage-bar{flex:2;height:5px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.ai-usage-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.ai-usage-count{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted);min-width:44px;text-align:right}

.plan-donut{display:flex;align-items:center;gap:22px}
.plan-legend{display:flex;flex-direction:column;gap:8px;flex:1}
.plan-legend-row{display:flex;align-items:center;gap:8px;font-size:12.5px}
.plan-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.cost-meter{position:relative;padding:14px 0 4px}
.cost-meter-label{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:6px}
.cost-meter-bar{height:10px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.cost-meter-fill{height:100%;border-radius:99px;transition:width .6s ease}

.recent-users-row{display:flex;align-items:center;gap:12px;padding:9px 0;
  border-bottom:1px solid rgba(255,255,255,.04)}
.recent-users-row:last-child{border-bottom:none}
.rur-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--ink)}
</style>
</head>
<body>
<script>requireAdmin()</script>

<div class="admin-layout">
  <div id="nav-root"></div>

  <main class="admin-main">
    <div style="position:relative;z-index:1">
      <div class="admin-page-hdr">
        <div class="admin-page-title">ダッシュボード</div>
        <div class="admin-page-sub" id="page-sub">読み込み中...</div>
      </div>

      <!-- アラートバー -->
      <div id="alert-area"></div>

      <!-- KPI -->
      <div class="kpi-grid" id="kpi-grid">
        <div class="kpi"><div class="kpi-label">総ユーザー数</div><div class="kpi-val" id="k-users">—</div><div class="kpi-icon">◉</div></div>
        <div class="kpi"><div class="kpi-label">今月の新規</div><div class="kpi-val blue" id="k-new">—</div><div class="kpi-icon">✦</div></div>
        <div class="kpi"><div class="kpi-label">今日のチャット</div><div class="kpi-val" id="k-chats">—</div><div class="kpi-icon">💬</div></div>
        <div class="kpi gold"><div class="kpi-label">今月のAPI費用</div><div class="kpi-val" id="k-cost">—</div><div class="kpi-icon">⬡</div></div>
        <div class="kpi"><div class="kpi-label">予算残高（推定）</div><div class="kpi-val" id="k-balance">—</div><div class="kpi-icon">▣</div></div>
        <div class="kpi"><div class="kpi-label">予算消化率</div><div class="kpi-val" id="k-pct">—</div>
          <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" id="k-bar" style="width:0%"></div></div>
          <div class="kpi-icon">△</div>
        </div>
      </div>

      <!-- 2カラム: チャートとプラン分布 -->
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px">
        <!-- 月別チャット数バーチャート -->
        <div class="admin-section">
          <div class="admin-section-hdr">
            <div class="admin-section-title">月別チャット数（直近6ヶ月）</div>
          </div>
          <div class="chart-bar-wrap" id="monthly-chart">
            <div style="color:var(--subtle);font-size:12px">読み込み中...</div>
          </div>
        </div>
        <!-- プラン分布 -->
        <div class="admin-section">
          <div class="admin-section-hdr">
            <div class="admin-section-title">プラン分布</div>
          </div>
          <div class="plan-donut" id="plan-dist">
            <div style="color:var(--subtle);font-size:12px">—</div>
          </div>
        </div>
      </div>

      <!-- 2カラム: AIタイプ別使用 と コスト状況 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
        <div class="admin-section">
          <div class="admin-section-hdr">
            <div class="admin-section-title">AI別利用数（今月）</div>
            <a href="admin-users.html" class="btn btn-ghost btn-sm">使用ログ →</a>
          </div>
          <div id="ai-usage-list"><div class="spinner"></div></div>
        </div>
        <div class="admin-section">
          <div class="admin-section-hdr">
            <div class="admin-section-title">API費用・予算</div>
            <a href="admin-charges.html" class="btn btn-ghost btn-sm">詳細 →</a>
          </div>
          <div id="cost-detail"></div>
        </div>
      </div>

      <!-- 最新ユーザー -->
      <div class="admin-section">
        <div class="admin-section-hdr">
          <div class="admin-section-title">最近登録したユーザー</div>
          <a href="admin-users.html" class="btn btn-ghost btn-sm">全員を見る →</a>
        </div>
        <div id="recent-users"><div class="spinner"></div></div>
      </div>
    </div>
  </main>
</div>

<script>
document.getElementById('nav-root').innerHTML = buildAdminNav('dashboard')

const AI_ICONS = {all:'✦',gourmet:'🍽️',travel:'✈️',cooking:'🍳',shopping:'🛍️',diy:'🔨',home:'📺',health:'💚',general:'💬'}
const PLAN_COLORS = {free:'rgba(255,255,255,.2)',pro:'#3b82f6',master:'#c9a84c'}
const AVATAR_COLORS = ['#6366f1','#06b6d4','#f59e0b','#10b981','#ec4899','#8b5cf6']

async function loadDashboard(){
  const [dash, users, openai] = await Promise.all([
    adminApi('/dashboard'),
    adminApi('/users?limit=6'),
    adminApi('/openai-usage'),
  ])
  if(!dash) return

  // 日時
  document.getElementById('page-sub').textContent =
    '最終更新: ' + new Date().toLocaleString('ja-JP')

  // KPI
  const u = dash.users, c = dash.cost
  // OpenAI実費（取得できた場合はそちらを優先）
  const realCost = openai?.ok ? openai.cost_usd : c.used_usd
  document.getElementById('k-users').textContent = fmtN(u.total)
  document.getElementById('k-new').textContent   = '+' + fmtN(u.new_month)
  document.getElementById('k-chats').textContent = fmtN(dash.chats.today) + '件'
  document.getElementById('k-cost').textContent  = fmt$(realCost)
  const balEl = document.getElementById('k-balance')
  balEl.textContent = fmt$(c.balance_usd)
  balEl.className   = 'kpi-val ' + (c.balance_usd < 0 ? 'red' : c.balance_usd < 10 ? '' : 'green')
  document.getElementById('k-pct').textContent   = c.used_pct + '%'
  const bar = document.getElementById('k-bar')
  bar.style.width = Math.min(c.used_pct, 100) + '%'
  if(c.used_pct >= 90) bar.classList.add('danger')
  else if(c.used_pct >= 70) bar.classList.add('warning')

  // アラート
  const alerts = []
  if(c.used_pct >= parseInt(dash.settings?.alert_threshold_pct||80))
    alerts.push({type:'warning', msg:`⚠️ API予算の消化率が ${c.used_pct}% に達しています`})
  if(c.balance_usd < 0)
    alerts.push({type:'danger', msg:`🚨 API残高がマイナスです。チャージをご確認ください`})
  if(dash.settings?.maintenance_mode === 'true')
    alerts.push({type:'info', msg:`🔧 現在メンテナンスモードが有効です`})
  document.getElementById('alert-area').innerHTML =
    alerts.map(a=>`<div class="alert-bar ${a.type}">${a.msg}</div>`).join('')

  // 月別チャートバー
  const monthly = dash.chats.monthly || []
  const maxC = Math.max(...monthly.map(m=>m.count), 1)
  document.getElementById('monthly-chart').innerHTML = monthly.length
    ? monthly.map(m=>`
        <div class="chart-bar-col">
          <div class="chart-bar" style="height:${Math.round(m.count/maxC*100)}px"
               data-tip="${m.month}: ${fmtN(m.count)}件"></div>
          <div class="chart-label">${m.month.slice(5)}</div>
        </div>`).join('')
    : '<div style="color:var(--subtle);font-size:12px">データなし</div>'

  // プラン分布
  const plans = u.plans
  const total = plans.free + plans.pro + plans.master || 1
  document.getElementById('plan-dist').innerHTML = `
    <div class="plan-legend">
      ${[['Free',plans.free,'free'],['Pro',plans.pro,'pro'],['Master',plans.master,'master']].map(([n,v,k])=>`
        <div class="plan-legend-row">
          <div class="plan-dot" style="background:${PLAN_COLORS[k]}"></div>
          <div style="flex:1">${n}</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:12px">${v}名</div>
          <div style="font-size:11px;color:var(--muted)">(${Math.round(v/total*100)}%)</div>
        </div>`).join('')}
    </div>`

  // AI別利用数（DBのlu_sessionsからai_type別集計）
  const aiTypes = ['gourmet','travel','cooking','shopping','diy','home','health','general']
  const aiLabels = {gourmet:'グルメ',travel:'旅行',cooking:'料理',shopping:'買い物',diy:'DIY',home:'家電',health:'健康',general:'総合'}
  const aiCounts = await adminApi('/ai-usage')
  const aiData = aiCounts?.counts || {}
  const maxA = Math.max(...aiTypes.map(t=>aiData[t]||0), 1)
  document.getElementById('ai-usage-list').innerHTML = aiTypes.map(a=>`
    <div class="ai-usage-row">
      <div class="ai-usage-icon">${AI_ICONS[a]||'✦'}</div>
      <div class="ai-usage-name">${aiLabels[a]||a}</div>
      <div class="ai-usage-bar"><div class="ai-usage-fill" style="width:${Math.round((aiData[a]||0)/maxA*100)}%"></div></div>
      <div class="ai-usage-count">${fmtN(aiData[a]||0)}</div>
    </div>`).join('')

  // コスト詳細（OpenAI実費 + ダッシュボードリンク）
  const oaiOk = openai?.ok
  document.getElementById('cost-detail').innerHTML = `
    <div style="margin-bottom:14px">
      ${oaiOk
        ? `<div style="font-size:11px;color:var(--muted);margin-bottom:6px">📡 OpenAI Usage API から自動取得（当月）</div>
           <div style="display:flex;flex-direction:column;gap:8px">
             ${[
               ['入力トークン', fmtN(openai.input_tokens)+'tok', ''],
               ['出力トークン', fmtN(openai.output_tokens)+'tok', ''],
               ['費用(USD)',    fmt$(openai.cost_usd,4), 'color:var(--gold2)'],
               ['費用(円換算)', '¥'+openai.cost_jpy.toLocaleString(), 'color:var(--muted)'],
             ].map(([l,v,st])=>`
               <div style="display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.04);padding-bottom:8px">
                 <span style="font-size:12px;color:var(--muted)">${l}</span>
                 <span style="font-family:'JetBrains Mono',monospace;font-size:13px;${st}">${v}</span>
               </div>`).join('')}
           </div>`
        : `<div class="alert-bar info" style="font-size:12px">⚠ OpenAI Usage APIの自動取得に失敗しました。<br>下記リンクから直接確認してください。</div>`
      }
    </div>
    <a href="https://platform.openai.com/usage" target="_blank"
       class="btn btn-ghost" style="width:100%;justify-content:center;margin-bottom:8px;gap:8px">
      ↗ OpenAI Dashboardで確認
    </a>
    <a href="admin-charges.html" class="btn btn-gold" style="width:100%;justify-content:center">
      + チャージ・予算管理
    </a>`

  // 最近登録ユーザー
  if(users?.users){
    document.getElementById('recent-users').innerHTML = users.users.length ? `
      <div>
        ${users.users.map((u,i)=>`
          <div class="recent-users-row">
            <div class="rur-avatar" style="background:${AVATAR_COLORS[i%AVATAR_COLORS.length]}">
              ${(u.nickname||u.email||'?')[0].toUpperCase()}
            </div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.nickname||'—'}</div>
              <div style="font-size:11px;color:var(--muted)">${u.email}</div>
            </div>
            <span class="badge badge-${u.plan}">${u.plan.toUpperCase()}</span>
            <div style="font-size:11px;color:var(--subtle);min-width:70px;text-align:right">${fmtDate(u.created_at)}</div>
          </div>`).join('')}
      </div>` : '<div style="color:var(--subtle);font-size:13px">ユーザーデータなし</div>'
  }
}

loadDashboard()
// 60秒ごとに自動更新
setInterval(loadDashboard, 60000)
</script>
</body>
</html>
